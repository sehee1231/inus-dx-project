<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>모닥 — 아카이브</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-posts.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['"Pretendard Variable"', 'Pretendard', 'system-ui', 'sans-serif'] },
          fontSize: { '2xs': ['0.6875rem', { lineHeight: '1rem' }] },
        },

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />

    body { font-feature-settings: "ss01" on; -webkit-tap-highlight-color: transparent; }
    .feed-card-media { height: 11.25rem; }
    @media (min-width: 640px) {
      .feed-card-media { height: 12.5rem; }
    }

</head>
<body class="min-h-screen bg-[#0c0c0e] font-sans text-zinc-100 antialiased">

    <div class="flex h-14 items-center gap-2 border-b border-zinc-800/80 px-4">
      <a href="project.html" class="flex h-9 w-9 shrink-0 items-center justify-center overflow-hidden rounded-xl bg-zinc-950 ring-1 ring-zinc-700/80"><img src="assets/modak-logo.png" alt="모닥" width="36" height="36" class="h-full w-full object-contain p-0.5" /></a>
      <div class="min-w-0">
        <a href="project.html" class="block truncate text-sm font-semibold tracking-tight text-zinc-100">모닥</a>
        <p class="truncate text-2xs text-zinc-500">모여서 빛나는 콘텐츠</p>

    </div>
    <nav class="flex flex-1 flex-col gap-1 px-2 py-3 text-sm">
      <a href="project.html" class="flex items-center gap-3 rounded-lg px-3 py-2 text-zinc-400 transition hover:bg-zinc-800/80 hover:text-zinc-100">
        <svg class="h-5 w-5 shrink-0 opacity-80" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"/></svg>
        피드 홈
      </a>
      <a href="browse.html" class="flex items-center gap-3 rounded-lg px-3 py-2 text-zinc-400 transition hover:bg-zinc-800/80 hover:text-zinc-100">
        <svg class="h-5 w-5 shrink-0 opacity-80" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 5h6v6H4V5zm10 0h6v6h-6V5zM4 13h6v6H4v-6zm10 0h6v6h-6v-6z"/></svg>
        카테고리 모아보기
      </a>
      <a href="archive.html" class="flex items-center gap-3 rounded-lg bg-zinc-800/90 px-3 py-2 font-medium text-zinc-100">
        <svg class="h-5 w-5 shrink-0 text-sky-400" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
        아카이브
      </a>
      <a href="compose.html" class="flex items-center gap-3 rounded-lg px-3 py-2 text-zinc-400 transition hover:bg-zinc-800/80 hover:text-zinc-100">
        <svg class="h-5 w-5 shrink-0 opacity-80" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" /></svg>
        새로 올리기
      </a>
    </nav>
  </aside>

  <div class="min-h-screen xl:pl-[232px]">
    <header class="sticky top-0 z-50 border-b border-zinc-800/90 bg-[#0c0c0e]/95 backdrop-blur-xl">
      <div class="mx-auto flex max-w-[1400px] items-center justify-between gap-3 px-4 py-3">
        <div class="flex items-center gap-2">
          <a href="project.html" class="flex h-8 w-8 items-center justify-center overflow-hidden rounded-xl bg-zinc-950 ring-1 ring-zinc-700/80 xl:hidden"><img src="assets/modak-logo.png" alt="모닥" width="32" height="32" class="h-full w-full object-contain p-0.5" /></a>
          <h1 class="text-base font-semibold tracking-tight text-zinc-100 sm:text-lg">아카이브</h1>
        </div>
        <a href="compose.html" class="inline-flex items-center rounded-lg border border-zinc-700/90 bg-zinc-900/60 px-3 py-1.5 text-xs font-semibold text-zinc-100 hover:bg-zinc-800/80">새 글 작성</a>
      </div>
    </header>

    <main class="mx-auto w-full max-w-[1400px] px-4 py-6 sm:py-7">
      <div class="flex flex-wrap items-end justify-between gap-3">
        <div>
          <p class="text-xs font-semibold uppercase tracking-wider text-zinc-500">Saved Posts</p>
          <h2 class="mt-1 text-lg font-bold text-zinc-100 sm:text-xl">저장된 게시글 모아보기</h2>
          <p class="mt-1 text-sm text-zinc-400">작성된 게시글만 최신순으로 표시합니다.</p>
        </div>
        <div class="flex shrink-0 flex-wrap items-center justify-end gap-2">
          <p id="archive-count" class="rounded-full bg-zinc-800/80 px-3 py-1 text-xs font-semibold text-zinc-200">0개</p>
          <div class="flex items-center gap-2" role="group" aria-label="보기 방식">
            <button type="button" id="arch-v-list" class="view-btn inline-flex h-10 w-10 items-center justify-center rounded-xl border border-zinc-700 bg-zinc-900/80 text-zinc-400 shadow-sm transition hover:border-zinc-600 hover:bg-zinc-800 hover:text-zinc-100" aria-label="리스트로 보기" title="리스트">
              <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h10" />
              </svg>
            </button>
            <button type="button" id="arch-v-grid" class="view-btn inline-flex h-10 w-10 items-center justify-center rounded-xl border border-zinc-700 bg-zinc-900/80 text-zinc-400 shadow-sm transition hover:border-zinc-600 hover:bg-zinc-800 hover:text-zinc-100" aria-label="카드로 보기" title="카드">
              <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 5a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM14 5a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zM4 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H5a1 1 0 01-1-1v-4zM14 15a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z" />
              </svg>
            </button>
          </div>
        </div>
      </div>

      <div id="archive-list" class="mt-4"></div>
      <div id="archive-empty" class="hidden mt-4 rounded-xl border border-zinc-800/90 bg-zinc-900/60 px-4 py-12 text-center">
        <p class="text-sm text-zinc-400">아직 저장된 게시글이 없습니다.</p>
        <a href="compose.html" class="mt-3 inline-flex text-sm font-semibold text-sky-400 hover:text-sky-300">첫 글 작성하기</a>
      </div>
    </main>
  </div>

  <script src="feed-view-shared.js"></script>
  <script>
    (function () {
      var CAT_LABEL = {
        planning: '기획',
        design: '디자인',
        development: '개발',
        curriculum: '커리큘럼',
        video: '영상',
        prompt: '프롬프트',
        output: '결과물',
        insight: '인사이트',
        community: '커뮤니티',
      };
      var CAT_BADGE = {
        planning: 'bg-indigo-900/60 text-indigo-100',
        design: 'bg-pink-900/60 text-pink-100',
        development: 'bg-teal-900/60 text-teal-100',
        curriculum: 'bg-emerald-900/60 text-emerald-100',
        video: 'bg-violet-900/60 text-violet-100',
        prompt: 'bg-fuchsia-900/60 text-fuchsia-100',
        output: 'bg-orange-900/60 text-orange-100',
        insight: 'bg-amber-900/60 text-amber-100',
        community: 'bg-rose-900/60 text-rose-100',
      };

      function esc(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/"/g, '&quot;');
      }

      function formatDate(iso) {
        if (!iso) return '';
        var dt = new Date(iso);
        if (isNaN(dt.getTime())) return '';
        return dt.toLocaleString('ko-KR', {
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit',
        });
      }

      function loadPosts() {
        try {
          var raw = localStorage.getItem('eduai_posts_v1');
          var arr = JSON.parse(raw || '[]');
          return Array.isArray(arr) ? arr : [];
        } catch (e) {
          return [];
        }
      }

      var listEl = document.getElementById('archive-list');
      var emptyEl = document.getElementById('archive-empty');
      var countEl = document.getElementById('archive-count');
      if (!listEl || !emptyEl || !countEl) return;
      function clipText(s, n) {
        s = String(s || '').trim();
        if (s.length <= n) return s;
        return s.slice(0, n - 1) + '...';
      }
      function catLabel(cat) {
        return CAT_LABEL[cat] || '커뮤니티';
      }
      function formatCompact(n) {
        if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
        return String(n);
      }
      function parseCompact(s) {
        s = String(s).trim();
        if (s.endsWith('k')) return Math.round(parseFloat(s) * 1000);
        var n = parseInt(s.replace(/,/g, ''), 10);
        return isNaN(n) ? 0 : n;
      }
      function escUrlAttr(s) {
        return String(s || '')
          .replace(/&/g, '&amp;')
          .replace(/"/g, '&quot;');
      }
      function youtubeVideoId(url) {
        if (!url) return '';
        var u = String(url).trim();
        var m = u.match(/[?&]v=([a-zA-Z0-9_-]{11})/);
        if (m) return m[1];
        m = u.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);
        if (m) return m[1];
        m = u.match(/youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/);
        if (m) return m[1];
        m = u.match(/youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/);
        if (m) return m[1];
        m = u.match(/youtube\.com\/live\/([a-zA-Z0-9_-]{11})/);
        if (m) return m[1];
        return '';
      }
      function loadCommentMap() {
        try {
          var raw = localStorage.getItem('eduai_comments_v1');
          var map = JSON.parse(raw || '{}');
          return map && typeof map === 'object' ? map : {};
        } catch (e) {
          return {};
        }
      }
      function extraCountForSlug(slug, map) {
        var arr = map && map[slug];
        return Array.isArray(arr) ? arr.length : 0;
      }
      function feedVideoFallbackMedia(labelEsc) {
        return (
          '<div class="relative z-[2] flex min-h-[8rem] shrink-0 flex-col items-center justify-center border-t border-zinc-800/60 bg-gradient-to-br from-zinc-900 via-zinc-950 to-zinc-900 feed-card-media">' +
          '<span class="rounded-md bg-zinc-700/80 px-1.5 py-0.5 text-[0.625rem] font-medium text-zinc-200">' +
          labelEsc +
          '</span>' +
          '</div>'
        );
      }
      function linkPreviewMedia(rawLink, slug, labelEsc) {
        var yid = youtubeVideoId(rawLink);
        if (yid) {
          return (
            '<div class="relative z-[2] shrink-0 overflow-hidden border-t border-zinc-800/60 bg-zinc-950 feed-card-media">' +
            '<a href="post-detail.html?slug=' +
            slug +
            '" class="relative block min-h-[8rem]">' +
            '<img src="https://img.youtube.com/vi/' +
            escUrlAttr(yid) +
            '/hqdefault.jpg" alt="" class="h-full w-full min-h-[8rem] object-cover" loading="lazy" />' +
            '<div class="pointer-events-none absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-black/20"></div>' +
            '<span class="pointer-events-none absolute bottom-2 left-2 rounded bg-red-600 px-1.5 py-0.5 text-[0.625rem] font-semibold text-white">YouTube</span>' +
            '<div class="pointer-events-none absolute inset-0 flex items-center justify-center">' +
            '<span class="flex h-14 w-14 items-center justify-center rounded-full bg-white/95 text-zinc-900 shadow-lg">' +
            '<svg class="ml-1 h-7 w-7" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></span></div></a>' +
            '<span class="pointer-events-none absolute left-2 top-2 rounded-md bg-black/70 px-1.5 py-0.5 text-[0.625rem] font-medium text-zinc-200">' +
            labelEsc +
            '</span></div>'
          );
        }
        if (/\.(png|jpe?g|gif|webp|avif|svg)(\?.*)?$/i.test(rawLink)) {
          return (
            '<a href="' +
            escUrlAttr(rawLink) +
            '" target="_blank" rel="noopener noreferrer" class="relative z-[2] block min-h-[8rem] overflow-hidden border-t border-zinc-800/60 bg-zinc-950 feed-card-media" onclick="event.stopPropagation()">' +
            '<img src="' +
            escUrlAttr(rawLink) +
            '" alt="" class="h-full w-full min-h-[8rem] object-cover" loading="lazy" />' +
            '<span class="pointer-events-none absolute left-2 top-2 rounded-md bg-black/70 px-1.5 py-0.5 text-[0.625rem] font-medium text-zinc-200">이미지</span>' +
            '</a>'
          );
        }
        if (/instagram\.com/i.test(rawLink)) {
          return (
            '<a href="' +
            escUrlAttr(rawLink) +
            '" target="_blank" rel="noopener noreferrer" class="relative z-[2] flex min-h-[8rem] shrink-0 flex-col items-center justify-center gap-1 border-t border-zinc-800/60 bg-zinc-900/80 feed-card-media px-3 text-center hover:bg-zinc-800/60" onclick="event.stopPropagation()">' +
            '<span class="text-2xs font-semibold text-sky-400">인스타 링크</span>' +
            '<span class="line-clamp-2 break-all text-2xs text-zinc-400">' +
            esc(clipText(rawLink, 72)) +
            '</span></a>'
          );
        }
        return (
          '<a href="' +
          escUrlAttr(rawLink) +
          '" target="_blank" rel="noopener noreferrer" class="relative z-[2] flex min-h-[8rem] shrink-0 flex-col items-center justify-center gap-1 border-t border-zinc-800/60 bg-zinc-900/80 feed-card-media px-3 text-center hover:bg-zinc-800/60" onclick="event.stopPropagation()">' +
          '<span class="text-2xs font-semibold text-sky-400">관련 링크</span>' +
          '<span class="line-clamp-2 break-all text-2xs text-zinc-400">' +
          esc(clipText(rawLink, 72)) +
          '</span></a>'
        );
      }
      function postCardHtml(p, commentMap) {
        var label = catLabel(p.cat);
        var c = extraCountForSlug(p.slug, commentMap);
        var slug = encodeURIComponent(p.slug);
        var t = esc(p.title || '제목 없음');
        var author = esc(p.authorName || '세희');
        var body = p.body || '';
        var excerpt = p.excerpt || '';
        var copySrc = body || excerpt || p.title || '';
        var preview = esc(clipText(body || excerpt || p.title || '', 320));
        var rawLink = (p.link || '').trim();
        var isVid = p.cat === 'video';
        var useOverlay = !isVid && p.cat !== 'prompt';
        var when = esc(formatDate(p.updatedAt || p.createdAt) || '방금');
        var linkMeta = '';
        if (rawLink) {
          linkMeta =
            ' · <a href="' +
            escUrlAttr(rawLink) +
            '" target="_blank" rel="noopener noreferrer" class="relative z-10 inline-block max-w-[45%] truncate align-bottom text-sky-400/90 hover:underline" onclick="event.stopPropagation()">' +
            esc(clipText(rawLink.replace(/^https?:\/\//i, ''), 32)) +
            '</a>';
        }
        var titleHtml = useOverlay
          ? '<span>' + t + '</span>'
          : '<a href="post-detail.html?slug=' + slug + '" class="transition hover:text-sky-400">' + t + '</a>';
        var overlayEl = useOverlay
          ? '<a href="post-detail.html?slug=' + slug + '" class="absolute inset-0 z-[1] rounded-t-xl" aria-label="글 상세 보기"></a>'
          : '';
        var mediaHtml;
        if (p.cat === 'prompt') {
          mediaHtml =
            '<div class="relative z-[2] shrink-0 overflow-hidden border-t border-zinc-800/60 bg-zinc-950/90 feed-card-media">' +
            '<span class="pointer-events-none absolute left-2 top-2 z-10 rounded bg-fuchsia-700/95 px-1.5 py-0.5 text-[0.625rem] font-semibold text-white">프롬프트</span>' +
            '<div class="absolute inset-0 overflow-y-auto px-2.5 pb-10 pt-8 font-mono text-2xs leading-relaxed text-zinc-300 sm:text-xs">' +
            preview +
            '</div>' +
            '<button type="button" data-copy="' +
            esc(copySrc) +
            '" class="prompt-copy-btn absolute bottom-2 right-2 z-10 flex h-8 w-8 items-center justify-center rounded-lg border border-zinc-600/90 bg-zinc-900/95 text-zinc-300 shadow-md hover:bg-zinc-800" aria-label="프롬프트 복사">' +
            '<svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg></button></div>';
        } else if (isVid) {
          var ytid = youtubeVideoId(rawLink);
          if (ytid) {
            mediaHtml =
              '<div class="relative z-[2] shrink-0 overflow-hidden border-t border-zinc-800/60 bg-zinc-950 feed-card-media">' +
              '<a href="post-detail.html?slug=' +
              slug +
              '" class="relative block min-h-[8rem]">' +
              '<img src="https://img.youtube.com/vi/' +
              escUrlAttr(ytid) +
              '/hqdefault.jpg" alt="" class="h-full w-full min-h-[8rem] object-cover" loading="lazy" />' +
              '<div class="pointer-events-none absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-black/20"></div>' +
              '<span class="pointer-events-none absolute bottom-2 left-2 rounded bg-red-600 px-1.5 py-0.5 text-[0.625rem] font-semibold text-white">YouTube</span>' +
              '<div class="pointer-events-none absolute inset-0 flex items-center justify-center">' +
              '<span class="flex h-14 w-14 items-center justify-center rounded-full bg-white/95 text-zinc-900 shadow-lg">' +
              '<svg class="ml-1 h-7 w-7" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></span></div></a>' +
              '<span class="pointer-events-none absolute left-2 top-2 rounded-md bg-black/70 px-1.5 py-0.5 text-[0.625rem] font-medium text-zinc-200">' +
              esc(label) +
              '</span></div>';
          } else if (rawLink) {
            mediaHtml = linkPreviewMedia(rawLink, slug, esc(label));
          } else {
            mediaHtml = feedVideoFallbackMedia(esc(label));
          }
        } else if (rawLink) {
          mediaHtml = linkPreviewMedia(rawLink, slug, esc(label));
        } else {
          mediaHtml = feedVideoFallbackMedia(esc(label));
        }
        var chip2 = excerpt
          ? '<span class="rounded-md bg-zinc-800/80 px-1.5 py-0.5 font-medium text-zinc-400">' + esc(clipText(excerpt, 28)) + '</span>'
          : '';
        return (
          '<article data-feed-href="post-detail.html?slug=' +
          slug +
          '" class="post-card ' +
          (isVid ? 'post-card--video ' : '') +
          'group relative flex h-full min-h-0 flex-col overflow-hidden rounded-xl border border-zinc-800/90 bg-zinc-900/50 shadow-lg shadow-black/25 ring-1 ring-white/[0.04]">' +
          '<div class="relative flex min-h-0 flex-1 flex-col">' +
          overlayEl +
          '<div class="relative z-[2] border-b border-zinc-800/80 px-3 pb-2.5 pt-3">' +
          '<h2 class="text-sm font-semibold leading-snug text-zinc-100">' +
          titleHtml +
          '</h2>' +
          '<p class="mt-1 truncate text-2xs text-zinc-500">' +
          author +
          ' · ' +
          esc(label) +
          ' · ' +
          when +
          linkMeta +
          '</p></div>' +
          mediaHtml +
          '</div>' +
          '<div class="relative z-10 mt-auto border-t border-zinc-800/80 px-3 py-2">' +
          '<div class="mb-2 flex flex-wrap items-center justify-between gap-2 text-2xs text-zinc-500">' +
          '<span class="flex flex-wrap gap-1">' +
          '<span class="rounded-md bg-zinc-800/80 px-1.5 py-0.5 font-medium text-zinc-400">#' +
          esc(label) +
          '</span>' +
          chip2 +
          '</span><time class="tabular-nums text-zinc-600">' + when + '</time></div>' +
          '<div class="flex flex-wrap items-center gap-1 border-t border-zinc-800/60 pt-2 text-2xs sm:gap-2">' +
          '<button type="button" data-reaction="like" data-base="0" aria-pressed="false" class="inline-flex items-center gap-1 rounded-lg px-1.5 py-1 font-medium text-zinc-400 hover:bg-zinc-800/90 hover:text-zinc-100"><svg class="ic-outline h-4 w-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24"><path stroke-linecap="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg><svg class="ic-solid hidden h-4 w-4 shrink-0 text-rose-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg><span class="js-react-count tabular-nums font-medium">0</span></button>' +
          '<a href="post-detail.html?slug=' + slug + '#comments" class="relative z-10 inline-flex items-center gap-1 rounded-lg px-1.5 py-1 font-medium text-zinc-400 hover:bg-zinc-800/90 hover:text-zinc-100" aria-label="댓글 보기"><svg class="h-4 w-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24"><path stroke-linecap="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg><span class="tabular-nums font-medium">' +
          String(c) +
          '</span></a>' +
          '<button type="button" data-reaction="save" data-base="0" aria-pressed="false" class="inline-flex items-center gap-1 rounded-lg px-1.5 py-1 font-medium text-zinc-400 hover:bg-zinc-800/90 hover:text-zinc-100"><svg class="ic-outline h-4 w-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24"><path stroke-linecap="round" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/></svg><svg class="ic-solid hidden h-4 w-4 shrink-0 text-amber-500" fill="currentColor" viewBox="0 0 24 24"><path d="M5 3a2 2 0 012-2h10a2 2 0 012 2v18l-7-4-7 4V3z"/></svg><span class="js-react-count tabular-nums font-medium">0</span></button>' +
          '<button type="button" data-share-path="post-detail.html?slug=' +
          slug +
          '" data-share-title="' +
          t +
          '" class="inline-flex items-center gap-1 rounded-lg px-1.5 py-1 font-medium text-zinc-400 hover:bg-zinc-800/90 hover:text-zinc-100" aria-label="공유"><svg class="h-4 w-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.59 13.51L15.42 17.5M15.41 6.5L8.59 10.49M18 21a3 3 0 100-6 3 3 0 000 6zM6 14a3 3 0 100-6 3 3 0 000 6zM18 9a3 3 0 100-6 3 3 0 000 6z"/></svg></button>' +
          '</div></div></article>'
        );
      }

      var posts = loadPosts().filter(function (p) {
        return p && p.slug;
      });
      posts.sort(function (a, b) {
        return String(b.createdAt || b.updatedAt || '').localeCompare(String(a.createdAt || a.updatedAt || ''));
      });

      var viewMode = MoaFeedView.getView();

      function wireArchiveCardInteractions() {
        listEl.querySelectorAll('[data-reaction]').forEach(function (btn) {
          var raw = btn.getAttribute('data-base');
          var base = parseInt(raw, 10);
          if (isNaN(base)) base = parseCompact(raw);
          var countElBtn = btn.querySelector('.js-react-count');
          var outline = btn.querySelector('.ic-outline');
          var solid = btn.querySelector('.ic-solid');
          var active = false;
          btn.addEventListener('click', function (e) {
            e.preventDefault();
            e.stopPropagation();
            active = !active;
            btn.setAttribute('aria-pressed', active);
            if (outline) outline.classList.toggle('hidden', active);
            if (solid) solid.classList.toggle('hidden', !active);
            var kind = btn.getAttribute('data-reaction');
            if (kind === 'like') {
              btn.classList.toggle('text-rose-500', active);
              btn.classList.toggle('text-zinc-500', !active);
            }
            if (kind === 'save') {
              btn.classList.toggle('text-amber-500', active);
              btn.classList.toggle('text-zinc-500', !active);
            }
            if (countElBtn) countElBtn.textContent = formatCompact(base + (active ? 1 : 0));
          });
        });
        listEl.querySelectorAll('[data-share-path]').forEach(function (btn) {
          btn.addEventListener('click', function (e) {
            e.preventDefault();
            e.stopPropagation();
            var url = new URL(btn.getAttribute('data-share-path') || 'project.html', window.location.href).href;
            var title = btn.getAttribute('data-share-title') || document.title;
            if (navigator.share) {
              navigator.share({ title: title, url: url }).catch(function () {});
              return;
            }
            if (navigator.clipboard && navigator.clipboard.writeText) {
              navigator.clipboard.writeText(url).catch(function () {});
              return;
            }
            window.prompt('링크를 복사하세요', url);
          });
        });
        listEl.querySelectorAll('.prompt-copy-btn').forEach(function (btn) {
          btn.addEventListener('click', function (e) {
            e.preventDefault();
            e.stopPropagation();
            var txt = btn.getAttribute('data-copy') || '';
            if (!txt) return;
            if (navigator.clipboard && navigator.clipboard.writeText) {
              navigator.clipboard.writeText(txt).catch(function () {});
              return;
            }
            window.prompt('복사하세요', txt);
          });
        });
      }

      function renderArchive() {
        countEl.textContent = posts.length + '개';
        listEl.innerHTML = '';
        MoaFeedView.syncToggleButtons(viewMode, document.getElementById('arch-v-grid'), document.getElementById('arch-v-list'));
        if (!posts.length) {
          emptyEl.classList.remove('hidden');
          listEl.className = 'mt-4';
          return;
        }
        emptyEl.classList.add('hidden');
        var commentMap = loadCommentMap();
        if (viewMode === 'list') {
          listEl.className = 'mt-4 ' + MoaFeedView.FEED_LIST_CLASS;
          listEl.innerHTML = posts
            .map(function (p) {
              return MoaFeedView.postListRowHtml({
                title: p.title,
                slug: p.slug,
                cat: p.cat,
                authorName: p.authorName,
                createdAt: p.createdAt,
                updatedAt: p.updatedAt,
              });
            })
            .join('');
        } else {
          listEl.className = 'mt-4 ' + MoaFeedView.FEED_GRID_CLASS;
          listEl.innerHTML = posts.map(function (p) {
            return postCardHtml(p, commentMap);
          }).join('');
          wireArchiveCardInteractions();
        }
      }

      function setArchiveView(mode, save) {
        viewMode = mode === 'list' ? 'list' : 'grid';
        if (save) MoaFeedView.setView(viewMode, true);
        renderArchive();
      }

      listEl.addEventListener('click', function (e) {
        var row = e.target.closest('.post-list-item');
        if (row && listEl.contains(row)) {
          if (e.target.closest('button, a, video, input, textarea')) return;
          var h = row.getAttribute('data-feed-href');
          if (h) window.location.href = h;
          return;
        }
        var card = e.target.closest('.post-card');
        if (!card || !listEl.contains(card)) return;
        if (card.classList.contains('post-card--video')) return;
        if (e.target.closest('button, a, video, input, textarea')) return;
        var href = card.getAttribute('data-feed-href');
        if (href) window.location.href = href;
      });

      var archListBtn = document.getElementById('arch-v-list');
      var archGridBtn = document.getElementById('arch-v-grid');
      if (archListBtn) archListBtn.addEventListener('click', function () { setArchiveView('list', true); });
      if (archGridBtn) archGridBtn.addEventListener('click', function () { setArchiveView('grid', true); });

      renderArchive();
      (async function syncArchiveFromDb() {
        if (!window.MoaPostsDB || !window.MoaPostsDB.fetchPosts) return;
        try {
          var mig = await window.MoaPostsDB.migrateLocalPostsOnce();
          console.log('[MIGRATE][archive]', mig);
          posts = (await window.MoaPostsDB.fetchPosts()).filter(function (p) {
            return p && p.slug;
          });
          posts.sort(function (a, b) {
            return String(b.createdAt || b.updatedAt || '').localeCompare(String(a.createdAt || a.updatedAt || ''));
          });
          renderArchive();
        } catch (e) {
          console.error('[MIGRATE][archive] failed:', e);
          console.warn('archive supabase sync failed:', e);
        }
      })();
    })();
  </script>
</body>
</html>
