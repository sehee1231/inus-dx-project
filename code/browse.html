  <script>
    var LABEL = {
      curriculum: { name: '커리큘럼', desc: '로드맵·학습 설계 중심 글입니다.' },
      video: { name: '영상', desc: '튜토리얼·강의형 콘텐츠입니다.' },
      prompt: { name: '프롬프트', desc: '바로 써 볼 수 있는 프롬프트 모음입니다.' },
      output: { name: '결과물', desc: '루브릭·퀴즈 등 완성 예시입니다.' },
      insight: { name: '인사이트', desc: '현장 노하우·운영 팁입니다.' },
      community: { name: '커뮤니티', desc: '질문·모임·소통 글이 모여 있습니다.' },
      planning: { name: '기획', desc: '요구사항·우선순위·지표·로드맵을 다룹니다.' },
      design: { name: '디자인', desc: 'UI·브랜딩·프로토타입·접근성 사례입니다.' },
      development: { name: '개발', desc: '구현·코드·연동·배포 노트입니다.' },
    };
    var ITEMS = {
      curriculum: [],
      video: [],
      prompt: [],
      output: [],
      insight: [],
      community: [],
      planning: [],
      design: [],
      development: [],
    };

    var PROMPT_SNIP = {};

    var CAT_THEME = {
      curriculum: { av: 'bg-emerald-900/85 text-emerald-100', chip: 'bg-emerald-900/70 text-emerald-100', wide: 'from-emerald-600 to-teal-800' },
      video: { av: 'bg-violet-900/85 text-violet-100', chip: 'bg-violet-900/70 text-violet-100', wide: 'from-violet-700 to-indigo-900' },
      prompt: { av: 'bg-fuchsia-900/90 text-fuchsia-50', chip: 'bg-fuchsia-800/80 text-fuchsia-50', wide: 'from-fuchsia-600 to-purple-900' },
      output: { av: 'bg-orange-900/85 text-orange-100', chip: 'bg-orange-900/70 text-orange-100', wide: 'from-orange-400 to-rose-600' },
      insight: { av: 'bg-amber-900/85 text-amber-100', chip: 'bg-amber-900/70 text-amber-100', wide: 'from-amber-600 to-zinc-800' },
      community: { av: 'bg-rose-900/85 text-rose-100', chip: 'bg-rose-900/70 text-rose-100', wide: 'from-rose-500 to-orange-700' },
      planning: { av: 'bg-indigo-900/85 text-indigo-100', chip: 'bg-indigo-900/70 text-indigo-100', wide: 'from-indigo-600 to-slate-800' },
      design: { av: 'bg-pink-900/85 text-pink-100', chip: 'bg-pink-900/70 text-pink-100', wide: 'from-pink-400 to-violet-600' },
      development: { av: 'bg-teal-900/85 text-teal-100', chip: 'bg-teal-900/70 text-teal-100', wide: 'from-teal-600 to-emerald-800' },
    };

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/"/g, '&quot;');
    }

    function parseAuthor(sub) {
      var parts = String(sub).split('·');
      var name = parts[0].trim() || '익명';
      return { name: name, initial: name.charAt(0) };
    }

    function fakeStats() {
      return { like: 0, cmt: 0, save: 0 };
    }
    var USER_POSTS_CACHE = null;
    function loadUserPosts() {
      if (Array.isArray(USER_POSTS_CACHE)) return USER_POSTS_CACHE.slice();
      try {
        var raw = localStorage.getItem('eduai_posts_v1');
        var arr = JSON.parse(raw || '[]');
        return Array.isArray(arr) ? arr : [];
      } catch (e) {
        return [];
      }
    }
    function userPostsByCat(cat) {
      return loadUserPosts()
        .filter(function (p) { return p && p.cat === cat; })
        .map(function (p) {
          return {
            slug: p.slug,
            t: p.title || '제목 없음',
            sub: (p.authorName || '세희') + ' · ' + (LABEL[cat] ? LABEL[cat].name : '커뮤니티'),
            link: (p.link || '').trim(),
            createdAt: p.createdAt,
            updatedAt: p.updatedAt,
          };
        });
    }

    function userCommentCount(slug) {
      try {
        var raw = localStorage.getItem('eduai_comments_v1');
        var map = JSON.parse(raw || '{}');
        if (!map || typeof map !== 'object') return 0;
        var arr = map[slug];
        return Array.isArray(arr) ? arr.length : 0;
      } catch (e) {
        return 0;
      }
    }

    function formatCompact(n) {
      if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
      return String(n);
    }

    function excerptFor(it, cat) {
      if (cat === 'insight') return '현장에서 바로 적용해 볼 수 있는 요약과 팁을 담았습니다.';
      if (cat === 'prompt') return '복사해서 바로 써 볼 수 있어요.';
      if (cat === 'output') return '수업·평가에 바로 연결할 수 있는 결과물 예시입니다.';
      if (cat === 'video') return '핵심 개념을 짧게 정리한 영상입니다.';
      if (cat === 'curriculum') return '주차별로 따라가며 익힐 수 있게 구성했어요.';
      if (cat === 'planning') return '문제 정의·범위·성공 지표까지 한 번에 정리했습니다.';
      if (cat === 'design') return '화면 규칙과 톤을 맞추기 위한 참고용입니다.';
      if (cat === 'development') return '연동·예외 처리·배포 시 유의할 점을 담았습니다.';

          e.preventDefault();

          var url = new URL(btn.getAttribute('data-share-path') || 'project.html', window.location.href).href;
          var title = btn.getAttribute('data-share-title') || document.title;
          var checkHtml = document.getElementById('icon-check-tpl').innerHTML;
          function flash() {
            btn.innerHTML = checkHtml;
            btn.disabled = true;
            setTimeout(function () {
              btn.innerHTML = shareSvg;
              btn.disabled = false;
            }, 1400);
          }
          if (navigator.share) {
            navigator.share({ title: title, url: url }).catch(function () {});
            return;
          }
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(url).then(flash).catch(function () {
              window.prompt('공유 링크:', url);
            });
          } else {
            window.prompt('공유 링크:', url);
          }
        });
      });
    }

    document.getElementById('v-list').addEventListener('click', function () {
      setView('list', true);
    });
    document.getElementById('v-feed').addEventListener('click', function () {
      setView('grid', true);
    });

    if (c && (viewParamRaw === null || viewParamRaw === '')) {
      var u0 = new URL(window.location.href);
      u0.searchParams.set('c', c);
      u0.searchParams.set('view', view);
      history.replaceState({}, '', u0.pathname + '?' + u0.searchParams.toString());
    } else if (c && viewParamRaw === 'feed') {
      var u1 = new URL(window.location.href);
      u1.searchParams.set('c', c);
      u1.searchParams.set('view', 'grid');
      history.replaceState({}, '', u1.pathname + '?' + u1.searchParams.toString());
    }

    setView(view, false);
    (async function syncPostsFromDb() {
      if (!window.MoaPostsDB || !window.MoaPostsDB.fetchPosts) return;
      try {
        await window.MoaPostsDB.migrateLocalPostsOnce();
        USER_POSTS_CACHE = await window.MoaPostsDB.fetchPosts();
        setView(view, false);
      } catch (e) {
        console.warn('browse supabase sync failed:', e);
      }
    })();
  </script>
    </div>
  <div id="floating-actions" class="fixed bottom-5 right-5 z-[70] flex flex-col items-end gap-2 xl:right-6">
    <button id="btn-scroll-top" type="button" class="pointer-events-none inline-flex h-10 w-10 items-center justify-center rounded-full border border-zinc-700/90 bg-zinc-900/95 text-zinc-200 opacity-0 shadow-xl shadow-black/40 transition hover:border-zinc-500 hover:bg-zinc-800" aria-label="맨 위로">
      <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7"/></svg>
    </button>
    <button id="btn-report-bug" type="button" class="inline-flex h-10 w-10 items-center justify-center rounded-full border border-rose-700/70 bg-rose-950/80 text-rose-200 shadow-xl shadow-black/40 transition hover:border-rose-500 hover:bg-rose-900/80" aria-label="버그 신고">
      <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="1.9" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v4m0 4h.01M8.93 4.93l-5 5m17.14-5l-5 5M6.34 14h11.32a2 2 0 011.73 3l-5.66 9.8a2 2 0 01-3.46 0L4.61 17a2 2 0 011.73-3z"/></svg>
    </button>
  </div>
  <script>
    (function () {
      var topBtn = document.getElementById('btn-scroll-top');
      var bugBtn = document.getElementById('btn-report-bug');
      function updateTopBtn() {
        var show = window.scrollY > 240;
        topBtn.classList.toggle('opacity-0', !show);
        topBtn.classList.toggle('pointer-events-none', !show);
      }
      updateTopBtn();
      window.addEventListener('scroll', updateTopBtn, { passive: true });
      topBtn.addEventListener('click', function () {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
      bugBtn.addEventListener('click', function () {
        var u = 'compose.html?bug=1&url=' + encodeURIComponent(location.href);
        window.location.href = u;
      });
    })();
  </script>
