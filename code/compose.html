  <script>
    if (window.MoaAuth && window.MoaAuth.requireAuth) { window.MoaAuth.requireAuth(); }
    var params = new URLSearchParams(location.search);
    var EDIT_SLUG = params.get('edit') || '';
    var URL_PRE = params.get('url') || '';
    var SELECTED_CAT = 'curriculum';
    document.querySelectorAll('.cat-chip').forEach(function (btn) {
      btn.addEventListener('click', function () {
        SELECTED_CAT = btn.getAttribute('data-cat') || 'curriculum';
        document.querySelectorAll('.cat-chip').forEach(function (b) {
          b.classList.remove('bg-sky-600', 'font-semibold', 'text-white', 'ring-sky-500');
          b.classList.add('bg-zinc-800/70', 'font-medium', 'text-zinc-300', 'ring-zinc-700/90');
        });
        btn.classList.remove('bg-zinc-800/70', 'font-medium', 'text-zinc-300', 'ring-zinc-700/90');
        btn.classList.add('bg-sky-600', 'font-semibold', 'text-white', 'ring-sky-500');
      });
    });

    function safeJsonParse(s, fallback) {
      try { return JSON.parse(s); } catch (e) { return fallback; }
    }
    var LS_MENTION_INBOX = 'eduai_mention_inbox_v1';
    function parseMentionNames(text) {
      var re = /[@＠]([\uac00-\ud7a3a-zA-Z0-9_·]{1,24})/g;
      var m;
      var out = [];
      var seen = {};
      while ((m = re.exec(String(text || ''))) !== null) {
        var name = String(m[1] || '').trim();
        if (!name || seen[name]) continue;
        seen[name] = 1;
        out.push(name);
      }
      return out;
    }
    function pushMentionNotifications(fromUser, names, ctx) {
      if (!names || !names.length) return;
      var arr = safeJsonParse(localStorage.getItem(LS_MENTION_INBOX), []);
      if (!Array.isArray(arr)) arr = [];
      var slug = ctx.postSlug || '';
      var title = ctx.postTitle || '';
      var snippet = String(ctx.snippet || '').slice(0, 160);
      var source = ctx.source || 'post';
      names.forEach(function (to) {
        if (!to || to === fromUser) return;
        arr.unshift({
          id: 'n-' + Date.now() + '-' + Math.floor(Math.random() * 1e9),
          at: new Date().toISOString(),
          read: false,
          toUser: to,
          fromUser: fromUser,
          postSlug: slug,
          postTitle: title,
          snippet: snippet,
          source: source,
        });
      });
      localStorage.setItem(LS_MENTION_INBOX, JSON.stringify(arr.slice(0, 200)));
    }
    function slugifyAscii(s) {
      s = String(s || '').trim();
      if (!s) return 'post';
      s = s.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9\-]+/g, '');
      return s || 'post';
    }
    function nowIso() { return new Date().toISOString(); }

    async function findPost(slug) {
      if (window.MoaPostsDB && window.MoaPostsDB.fetchPostBySlug) {
        return await window.MoaPostsDB.fetchPostBySlug(slug);
      }
      return null;
    }
    function setCatUI(cat) {
      SELECTED_CAT = cat || 'curriculum';
      document.querySelectorAll('.cat-chip').forEach(function (b) {
        b.classList.remove('bg-sky-600', 'font-semibold', 'text-white', 'ring-sky-500');
        b.classList.add('bg-zinc-800/70', 'font-medium', 'text-zinc-300', 'ring-zinc-700/90');
      });
      var onBtn = document.querySelector('.cat-chip[data-cat=\"' + SELECTED_CAT + '\"]');
      if (onBtn) {
        onBtn.classList.remove('bg-zinc-800/70', 'font-medium', 'text-zinc-300', 'ring-zinc-700/90');
        onBtn.classList.add('bg-sky-600', 'font-semibold', 'text-white', 'ring-sky-500');
      }
    }

    async function publish() {
      if (!window.MoaPostsDB || !window.MoaPostsDB.upsertPost) {
        alert('Supabase 연결 스크립트를 불러오지 못했습니다.');
        return;
      }
      var title = (document.getElementById('in-title').value || '').trim();
      var excerpt = (document.getElementById('in-excerpt').value || '').trim();
      var body = (document.getElementById('in-body').value || '').trim();
      var link = (document.getElementById('in-link').value || '').trim();

      if (!title) { alert('제목을 입력해 주세요.'); document.getElementById('in-title').focus(); return; }
      if (!body) { alert('본문을 입력해 주세요.'); document.getElementById('in-body').focus(); return; }

      if (EDIT_SLUG) {
        var prev = await findPost(EDIT_SLUG);
        if (!prev) {
          alert('수정할 글을 찾지 못했습니다.');
          return;
        }
        await window.MoaPostsDB.upsertPost({
          slug: EDIT_SLUG,
          cat: SELECTED_CAT,
          title: title,
          excerpt: excerpt,
          body: body,
          link: link,
          authorName: prev.authorName || '세희',
          createdAt: prev.createdAt || nowIso(),
          updatedAt: nowIso(),
        });
        window.location.replace('post-detail.html?slug=' + encodeURIComponent(EDIT_SLUG));
        return;
      }

      var base = slugifyAscii(title).slice(0, 24);
      var slug = 'u-' + Date.now() + '-' + base;
      var post = { slug: slug, cat: SELECTED_CAT, title: title, excerpt: excerpt, body: body, link: link, authorName: '세희', createdAt: nowIso() };
      await window.MoaPostsDB.upsertPost(post);
      var blob = title + '\n' + excerpt + '\n' + body;
      var mn = parseMentionNames(blob);
      if (mn.length) {
        pushMentionNotifications('세희', mn, {
          postSlug: slug,
          postTitle: title,
          snippet: body.slice(0, 120),
          source: 'post',
        });
      }
      window.location.replace('post-detail.html?slug=' + encodeURIComponent(slug));
    }

    async function initEditMode() {
      if (!window.MoaPostsDB || !window.MoaPostsDB.migrateLocalPostsOnce) return;
      try {
        await window.MoaPostsDB.migrateLocalPostsOnce();
      } catch (e) {
        console.warn('Supabase migration skipped:', e);
      }
      if (!EDIT_SLUG) return;
      var p = await findPost(EDIT_SLUG);
      if (p) {
        var uid = null;
        if (window.MoaPostsDB && window.MoaPostsDB.getCurrentUserId) {
          try { uid = await window.MoaPostsDB.getCurrentUserId(); } catch (e) {}
        }
        if (p.authorId && uid && p.authorId !== uid) {
          document.getElementById('page-title').textContent = '글 수정';
          document.getElementById('btn-publish').textContent = '저장';
          document.getElementById('page-sub').textContent = '작성자 본인만 수정할 수 있습니다.';
          document.getElementById('btn-publish').disabled = true;
          document.getElementById('btn-publish').classList.add('opacity-40');
          return;
        }
        document.getElementById('page-title').textContent = '글 수정';
        document.title = '모닥 — 글 수정';
        document.getElementById('btn-publish').textContent = '저장';
        document.getElementById('page-sub').textContent = '수정 사항을 저장합니다';
        document.getElementById('save-hint').textContent = '저장하면 즉시 반영됩니다.';
        document.getElementById('in-title').value = p.title || '';
        document.getElementById('in-excerpt').value = p.excerpt || '';
        document.getElementById('in-body').value = p.body || '';
        document.getElementById('in-link').value = p.link || '';
        setCatUI(p.cat || 'curriculum');
      } else {
        document.getElementById('page-title').textContent = '글 수정';
        document.getElementById('btn-publish').textContent = '저장';
        document.getElementById('page-sub').textContent = '수정할 글을 찾지 못했습니다.';
        document.getElementById('btn-publish').disabled = true;
        document.getElementById('btn-publish').classList.add('opacity-40');
      }
    }

    if (!EDIT_SLUG && URL_PRE) {
      document.getElementById('in-link').value = URL_PRE;
    }
    var BUG_MODE = params.get('bug') === '1';
    if (!EDIT_SLUG && BUG_MODE) {
      document.getElementById('page-title').textContent = '버그 제보';
      document.title = '모닥 — 버그 제보';
      document.getElementById('page-sub').textContent = '문제가 발생한 화면 정보를 함께 남겨 주세요';
      document.getElementById('in-title').value = '[버그 제보] ';
      document.getElementById('in-body').value = [
        '발생 페이지: ' + location.href,
        '',
        '문제 설명:',
        '',
        '재현 방법:',
        '1) ',
        '2) ',
        '',
        '기대 동작:',
      ].join('\n');
      setCatUI('community');
    }

    document.getElementById('btn-publish').addEventListener('click', function () {
      publish().catch(function (e) {
        console.error(e);
        alert('저장 중 오류가 발생했습니다. 콘솔 로그를 확인해 주세요.');
      });
    });
    document.addEventListener('keydown', function (e) {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        publish().catch(function () {});
      }
    });
    initEditMode();

    (function mentionPicker() {
      var MENTION_PEOPLE = ['순용', '민수', '태호', '상현', '인선', '선민', '이준', '세희'];
      var picker = document.createElement('div');
      picker.id = 'mention-picker';
      picker.className =
        'fixed z-[100] hidden max-h-52 w-[min(calc(100vw-2rem),16rem)] overflow-y-auto rounded-xl border border-zinc-700/90 bg-zinc-950 py-1 text-sm shadow-2xl shadow-black/50 ring-1 ring-white/5';
      picker.setAttribute('role', 'listbox');
      picker.setAttribute('aria-label', '멘션할 사람');
      document.body.appendChild(picker);

      var mentionOpen = {
        el: null,
        start: 0,
        activeIndex: 0,
        filtered: [],
      };

      function hidePicker() {
        picker.classList.add('hidden');
        mentionOpen.el = null;
      }

      function filterPeople(q) {
        q = String(q || '').toLowerCase();
        if (!q) return MENTION_PEOPLE.slice();
        return MENTION_PEOPLE.filter(function (n) {
          return String(n).toLowerCase().indexOf(q) !== -1;
        });
      }

      function getMentionRange(text, caret) {
        text = String(text);
        var i = caret - 1;
        while (i >= 0) {
          var ch = text.charAt(i);
          if (ch === '@' || ch === '＠') {
            var seg = text.slice(i + 1, caret);
            if (/^[\uac00-\ud7a3a-zA-Z0-9_·]*$/.test(seg)) return { start: i, query: seg };
            return null;
          }
          if (ch === ' ' || ch === '\n' || ch === '\r') return null;
          i--;
        }
        return null;
      }

      function positionPicker(el) {
        var r = el.getBoundingClientRect();
        picker.style.position = 'fixed';
        var top = r.bottom + 6;
        var approxH = 208;
        if (top + approxH > window.innerHeight - 8) top = Math.max(8, r.top - 6 - approxH);
        picker.style.top = top + 'px';
        picker.style.left = Math.max(8, Math.min(r.left, window.innerWidth - 268)) + 'px';
      }

      function renderPickerItems() {
        picker.innerHTML = '';
        var items = mentionOpen.filtered;
        if (!items.length) {
          var empty = document.createElement('div');
          empty.className = 'px-3 py-2 text-2xs text-zinc-500';
          empty.textContent = '일치하는 이름이 없습니다';
          picker.appendChild(empty);
          return;
        }
        items.forEach(function (name, idx) {
          var b = document.createElement('button');
          b.type = 'button';
          b.className =
            'flex w-full items-center gap-2 px-3 py-2 text-left text-sm text-zinc-200 transition hover:bg-zinc-800/90 ' +
            (idx === mentionOpen.activeIndex ? 'bg-zinc-800/80' : '');
          b.setAttribute('role', 'option');
          b.textContent = '@' + name;
          b.addEventListener('mousedown', function (e) {
            e.preventDefault();
            insertPick(name);
          });
          picker.appendChild(b);
        });
      }

      function insertPick(name) {
        var el = mentionOpen.el;
        if (!el) return hidePicker();
        var v = el.value;
        var caret = el.selectionStart;
        var range = getMentionRange(v, caret);
        if (!range) return hidePicker();
        var before = v.slice(0, range.start);
        var after = v.slice(caret);
        var ins = '@' + name + ' ';
        el.value = before + ins + after;
        var nc = before.length + ins.length;
        el.focus();
        try {
          el.setSelectionRange(nc, nc);
        } catch (err) {}
        hidePicker();
      }

      function tryOpen(el) {
        if (el !== document.getElementById('in-body') && el !== document.getElementById('in-title')) {
          hidePicker();
          return;
        }
        var v = el.value;
        var caret = el.selectionStart;
        var range = getMentionRange(v, caret);
        if (!range) {
          hidePicker();
          return;
        }
        mentionOpen.el = el;
        mentionOpen.start = range.start;
        mentionOpen.filtered = filterPeople(range.query);
        mentionOpen.activeIndex = 0;
        positionPicker(el);
        picker.classList.remove('hidden');
        renderPickerItems();
      }

      function onFieldKeydown(e) {
        if (picker.classList.contains('hidden')) return;
        if (e.key === 'Escape') {
          e.preventDefault();
          hidePicker();
          return;
        }
        if (!mentionOpen.filtered.length) return;
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          mentionOpen.activeIndex = Math.min(mentionOpen.activeIndex + 1, mentionOpen.filtered.length - 1);
          renderPickerItems();
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          mentionOpen.activeIndex = Math.max(mentionOpen.activeIndex - 1, 0);
          renderPickerItems();
        } else if (e.key === 'Enter') {
          e.preventDefault();
          insertPick(mentionOpen.filtered[mentionOpen.activeIndex]);
        }
      }

      function scheduleTryOpen(el) {
        requestAnimationFrame(function () {
          tryOpen(el);
        });
      }
      ['in-title', 'in-body'].forEach(function (id) {
        var el = document.getElementById(id);
        if (!el) return;
        el.addEventListener('input', function () {
          scheduleTryOpen(el);
        });
        el.addEventListener('keyup', function () {
          scheduleTryOpen(el);
        });
        el.addEventListener('keydown', function (e) {
          onFieldKeydown(e);
          if (picker.classList.contains('hidden') && (e.key === '@' || (e.key === '2' && e.shiftKey))) {
            setTimeout(function () {
              tryOpen(el);
            }, 0);
          }
        });
      });

      document.addEventListener('mousedown', function (e) {
        if (picker.classList.contains('hidden')) return;
        if (picker.contains(e.target)) return;
        var t = e.target;
        if (t === document.getElementById('in-title') || t === document.getElementById('in-body')) return;
        hidePicker();
      });

      window.addEventListener(
        'scroll',
        function () {
          if (!picker.classList.contains('hidden') && mentionOpen.el) positionPicker(mentionOpen.el);
        },
        true
      );
    })();
  </script>
  <div id="floating-actions" class="fixed bottom-5 right-5 z-[70] flex flex-col items-end gap-2 xl:right-6">
    <button id="btn-scroll-top" type="button" class="pointer-events-none inline-flex h-10 w-10 items-center justify-center rounded-full border border-zinc-700/90 bg-zinc-900/95 text-zinc-200 opacity-0 shadow-xl shadow-black/40 transition hover:border-zinc-500 hover:bg-zinc-800" aria-label="맨 위로">
      <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7"/></svg>
    </button>
    <button id="btn-report-bug" type="button" class="inline-flex h-10 w-10 items-center justify-center rounded-full border border-rose-700/70 bg-rose-950/80 text-rose-200 shadow-xl shadow-black/40 transition hover:border-rose-500 hover:bg-rose-900/80" aria-label="버그 신고">
      <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="1.9" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v4m0 4h.01M8.93 4.93l-5 5m17.14-5l-5 5M6.34 14h11.32a2 2 0 011.73 3l-5.66 9.8a2 2 0 01-3.46 0L4.61 17a2 2 0 011.73-3z"/></svg>
    </button>
  </div>
  <script>
    (function () {
      var topBtn = document.getElementById('btn-scroll-top');
      var bugBtn = document.getElementById('btn-report-bug');
      function updateTopBtn() {
        var show = window.scrollY > 240;
        topBtn.classList.toggle('opacity-0', !show);
        topBtn.classList.toggle('pointer-events-none', !show);
      }
      updateTopBtn();
      window.addEventListener('scroll', updateTopBtn, { passive: true });
      topBtn.addEventListener('click', function () {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
      bugBtn.addEventListener('click', function () {
        var u = 'compose.html?bug=1&url=' + encodeURIComponent(location.href);
        window.location.href = u;
      });
    })();
  </script>
