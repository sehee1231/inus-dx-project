  <script>
    (function () {
      document.getElementById('btn-back').addEventListener('click', function () {
        if (window.history.length > 1) window.history.back();
        else window.location.href = 'project.html';
      });
    })();

    function formatCompact(n) {
      if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
      return String(n);
    }

    function parseCompact(s) {
      s = String(s).trim();
      if (s.endsWith('k')) return Math.round(parseFloat(s) * 1000);
      var n = parseInt(s.replace(/,/g, ''), 10);
      return isNaN(n) ? 0 : n;
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function escAttr(s) {
      return String(s || '')
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function safeJsonParse(s, fallback) {
      try { return JSON.parse(s); } catch (e) { return fallback; }
    }

    var LS_MENTION_INBOX = 'eduai_mention_inbox_v1';
    function parseMentionNames(text) {
      var re = /[@＠]([\uac00-\ud7a3a-zA-Z0-9_·]{1,24})/g;
      var m;
      var out = [];
      var seen = {};
      while ((m = re.exec(String(text || ''))) !== null) {
        var name = String(m[1] || '').trim();
        if (!name || seen[name]) continue;
        seen[name] = 1;
        out.push(name);
      }
      return out;
    }
    function pushMentionNotifications(fromUser, names, ctx) {
      if (!names || !names.length) return;
      var arr = safeJsonParse(localStorage.getItem(LS_MENTION_INBOX), []);
      if (!Array.isArray(arr)) arr = [];
      var slug = ctx.postSlug || '';
      var title = ctx.postTitle || '';
      var snippet = String(ctx.snippet || '').slice(0, 160);
      var source = ctx.source || 'comment';
      names.forEach(function (to) {
        if (!to || to === fromUser) return;
        arr.unshift({
          id: 'n-' + Date.now() + '-' + Math.floor(Math.random() * 1e9),
          at: new Date().toISOString(),
          read: false,
          toUser: to,
          fromUser: fromUser,
          postSlug: slug,
          postTitle: title,
          snippet: snippet,
          source: source,
        });
      });
      localStorage.setItem(LS_MENTION_INBOX, JSON.stringify(arr.slice(0, 200)));
    }

    function timeAgoShort(iso) {
      try {
        var t = new Date(iso).getTime();
        var now = Date.now();
        var sec = Math.max(0, Math.floor((now - t) / 1000));
        if (sec < 60) return '방금';
        var min = Math.floor(sec / 60);
        if (min < 60) return min + '분 전';
        var hr = Math.floor(min / 60);
        if (hr < 24) return hr + '시간 전';
        var d = Math.floor(hr / 24);
        return d + '일 전';
      } catch (e) {
        return '방금';
      }
    }

    function wireReactions(scope) {
      scope.querySelectorAll('[data-reaction]').forEach(function (btn) {
        var base = parseInt(btn.getAttribute('data-base'), 10);
        var countEl = btn.querySelector('.js-react-count');
        var outline = btn.querySelector('.ic-outline');
        var solid = btn.querySelector('.ic-solid');
        var active = false;
        btn.addEventListener('click', function (e) {
          e.preventDefault();
          e.stopPropagation();
          active = !active;
          btn.setAttribute('aria-pressed', active);
          if (outline) outline.classList.toggle('hidden', active);
          if (solid) solid.classList.toggle('hidden', !active);
          var kind = btn.getAttribute('data-reaction');
          if (kind === 'like') {
            btn.classList.toggle('text-rose-500', active);
            btn.classList.toggle('text-zinc-500', !active);
          }
          if (kind === 'save') {
            btn.classList.toggle('text-amber-600', active);
            btn.classList.toggle('text-zinc-500', !active);
          }
          if (countEl) countEl.textContent = formatCompact(base + (active ? 1 : 0));

    }

    function wireCopyButtons(root) {
      var hooked = new WeakSet();
      root.querySelectorAll('.js-prompt-copy, button[data-copy], .prompt-copy-btn').forEach(function (btn) {
        if (hooked.has(btn)) return;
        hooked.add(btn);
        btn.addEventListener('click', function (e) {
          e.preventDefault();
          e.stopPropagation();
          var text = btn.getAttribute('data-copy') || '';
          if (!text) return;
          var copyIcon = document.getElementById('icon-copy').innerHTML;
          var checkIcon = document.getElementById('icon-check').innerHTML;
          function flash() {
            btn.innerHTML = checkIcon;
            btn.disabled = true;
            setTimeout(function () {
              btn.innerHTML = copyIcon;
              btn.disabled = false;
            }, 1400);
          }
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(flash).catch(function () {
              window.prompt('프롬프트 복사:', text);
            });
          } else {
            window.prompt('프롬프트 복사:', text);
          }
        });
      });
    }

    function wireShareButtons(root) {
      root.querySelectorAll('[data-share-path]').forEach(function (btn) {
        btn.addEventListener('click', function (e) {
          e.preventDefault();
          e.stopPropagation();
          var url = new URL(btn.getAttribute('data-share-path') || 'project.html', window.location.href).href;
          var title = btn.getAttribute('data-share-title') || document.title;
          var checkIcon = document.getElementById('icon-check').innerHTML;
          function flash() {
            btn.innerHTML = checkIcon;
            btn.disabled = true;
            setTimeout(function () {
              btn.innerHTML = SHARE_ICON;
              btn.disabled = false;
            }, 1400);
          }
          if (navigator.share) {
            navigator.share({ title: title, url: url }).catch(function () {});
            return;
          }
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(url).then(flash).catch(function () {
              window.prompt('공유 링크:', url);
            });
          } else {
            window.prompt('공유 링크:', url);
          }
        });
      });
    }

    function loadUserComments(slug) {

    function addUserComment(slug, who, text) {
      var all = safeJsonParse(localStorage.getItem(LS_COMMENTS), {});
      if (!all || typeof all !== 'object') all = {};
      var arr = all[slug];
      if (!Array.isArray(arr)) arr = [];

    function deleteUserComment(slug, id) {
      var all = safeJsonParse(localStorage.getItem(LS_COMMENTS), {});
      if (!all || typeof all !== 'object') all = {};
      var arr = all[slug];
      if (!Array.isArray(arr)) return;
      all[slug] = arr.filter(function (c) { return c && c.id !== id; });
      localStorage.setItem(LS_COMMENTS, JSON.stringify(all));
    }

    function updateUserComment(slug, id, text) {
      var all = safeJsonParse(localStorage.getItem(LS_COMMENTS), {});
      if (!all || typeof all !== 'object') all = {};
      var arr = all[slug];
      if (!Array.isArray(arr)) return false;
      var changed = false;
      for (var i = 0; i < arr.length; i++) {
        if (arr[i] && arr[i].id === id) {
          arr[i].text = text;
          changed = true;
          break;
        }
      }
      if (!changed) return false;
      all[slug] = arr;
      localStorage.setItem(LS_COMMENTS, JSON.stringify(all));
      return true;
    }

      }
      function openMentionPicker() {
        var caret = inEl.selectionStart || 0;
        var range = mentionRange(inEl.value || '', caret);
        if (!range) return hideMentionPicker();
        var q = String(range.q || '').toLowerCase();
        mentionState.filtered = mentionPeople.filter(function (n) {
          return !q || n.toLowerCase().indexOf(q) !== -1;
        });
        mentionState.active = 0;
        mentionPicker.innerHTML = '';
        if (!mentionState.filtered.length) {
          mentionPicker.innerHTML = '<div class="px-3 py-2 text-2xs text-zinc-500">일치하는 이름이 없습니다</div>';
        } else {
          mentionState.filtered.forEach(function (name, idx) {
            var b = document.createElement('button');
            b.type = 'button';
            b.className =
              'flex w-full items-center px-3 py-2 text-left text-sm text-zinc-200 hover:bg-zinc-800/90 ' +
              (idx === mentionState.active ? 'bg-zinc-800/80' : '');
            b.textContent = '@' + name;
            b.addEventListener('mousedown', function (e) {
              e.preventDefault();
              selectMention(name);
            });
            mentionPicker.appendChild(b);
          });
        }
        var r = inEl.getBoundingClientRect();
        mentionPicker.style.top = Math.min(window.innerHeight - 220, r.bottom + 6) + 'px';
        mentionPicker.style.left = Math.max(8, Math.min(r.left, window.innerWidth - 268)) + 'px';
        mentionPicker.classList.remove('hidden');
        mentionState.open = true;
      }
      function selectMention(name) {
        var caret = inEl.selectionStart || 0;
        var v = inEl.value || '';
        var range = mentionRange(v, caret);
        if (!range) return hideMentionPicker();
        var ins = '@' + name + ' ';
        inEl.value = v.slice(0, range.start) + ins + v.slice(caret);
        var nc = range.start + ins.length;
        inEl.focus();
        inEl.setSelectionRange(nc, nc);
        hideMentionPicker();
      }
      var editingCommentId = null;
      function setEditMode(id, text) {
        editingCommentId = id;
        inEl.value = text || '';
        btnEl.textContent = '수정 저장';
        cancelEl.classList.remove('hidden');
        inEl.focus();
      }
      function clearEditMode() {
        editingCommentId = null;
        btnEl.textContent = '등록';
        cancelEl.classList.add('hidden');
      }
      function submitComment() {
        var text = (inEl.value || '').trim();
        if (!text) return;
        if (editingCommentId) {
          var ok = updateUserComment(slug, editingCommentId, text);
          if (!ok) {
            alert('수정할 댓글을 찾지 못했습니다.');
          }
        } else {
          addUserComment(slug, '세희', text);
          var mn = parseMentionNames(text);
          if (mn.length) {
            pushMentionNotifications('세희', mn, {
              postSlug: slug,
              postTitle: post.title || '',
              snippet: text,
              source: 'comment',
            });
          }
        }
        inEl.value = '';
        clearEditMode();
        renderAllComments();
      }
      btnEl.addEventListener('click', submitComment);
      cancelEl.addEventListener('click', function () {
        inEl.value = '';
        clearEditMode();
      });
      inEl.addEventListener('input', function () {
        requestAnimationFrame(openMentionPicker);
      });
      inEl.addEventListener('keyup', function () {
        requestAnimationFrame(openMentionPicker);
      });
      inEl.addEventListener('keydown', function (e) {
        if (mentionState.open && mentionState.filtered.length) {
          if (e.key === 'ArrowDown') {
            e.preventDefault();
            mentionState.active = Math.min(mentionState.active + 1, mentionState.filtered.length - 1);
            return openMentionPicker();
          }
          if (e.key === 'ArrowUp') {
            e.preventDefault();
            mentionState.active = Math.max(mentionState.active - 1, 0);
            return openMentionPicker();
          }
          if (e.key === 'Enter') {
            e.preventDefault();
            return selectMention(mentionState.filtered[mentionState.active]);
          }
          if (e.key === 'Escape') {
            e.preventDefault();
            return hideMentionPicker();
          }
        }
        if (e.key === 'Enter') submitComment();
      });
      document.addEventListener('mousedown', function (e) {
        if (!mentionState.open) return;
        if (mentionPicker.contains(e.target) || e.target === inEl) return;
        hideMentionPicker();
      });

      document.getElementById('comment-thread').addEventListener('click', function (e) {
        var t = e.target;
        if (!t || !t.classList) return;
        if (t.classList.contains('js-edit-comment')) {
          var eid = t.getAttribute('data-comment-id') || '';
          var etext = t.getAttribute('data-comment-text') || '';
          if (!eid) return;
          setEditMode(eid, etext);
          return;
        }
        if (!t.classList.contains('js-del-comment')) return;
        var id = t.getAttribute('data-comment-id') || '';
        if (!id) return;
        if (!confirm('이 댓글을 삭제할까요?')) return;
        deleteUserComment(slug, id);
        if (editingCommentId === id) {
          inEl.value = '';
          clearEditMode();
        }
        renderAllComments();
      });

      // 내 글 편집/삭제
      if (userPost) {
        var bEdit = document.getElementById('btn-edit');
        var bDel = document.getElementById('btn-delete');
        (async function bindPostManageButtons() {
          var canManage = true;
          if (userPost.authorId && window.MoaPostsDB && window.MoaPostsDB.getCurrentUserId) {
            try {
              var uid = await window.MoaPostsDB.getCurrentUserId();
              canManage = !!uid && userPost.authorId === uid;
            } catch (e) {
              canManage = false;
            }
          }
          if (!canManage) return;
          bEdit.classList.remove('hidden');
          bDel.classList.remove('hidden');
          bEdit.addEventListener('click', function () {
            location.href = 'compose.html?edit=' + encodeURIComponent(userPost.slug);
          });
          bDel.addEventListener('click', async function () {
            if (!confirm('이 글을 삭제할까요? (댓글도 함께 삭제됩니다)')) return;
            if (window.MoaPostsDB && window.MoaPostsDB.deletePostBySlug) {
              try {
                await window.MoaPostsDB.deletePostBySlug(userPost.slug);
              } catch (e) {
                alert('작성자 본인만 삭제할 수 있습니다.');
                return;
              }
            } else {
              var posts = loadUserPosts();
              var next = posts.filter(function (p) { return p && p.slug !== userPost.slug; });
              localStorage.setItem(LS_POSTS, JSON.stringify(next));
            }
            // delete comments for this slug
            var all = safeJsonParse(localStorage.getItem(LS_COMMENTS), {});
            if (all && typeof all === 'object') {
              delete all[userPost.slug];
              localStorage.setItem(LS_COMMENTS, JSON.stringify(all));
            }
            location.href = 'project.html';
          });
        })();
      }

      function scrollToCommentsIfHash() {
        if (location.hash !== '#comments') return;
        var el = document.getElementById('comments');
        if (!el) return;
        function go() {
          el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        requestAnimationFrame(function () {
          requestAnimationFrame(go);
        });
      }
      initRelatedPosts(slug);
      scrollToCommentsIfHash();
      window.addEventListener('hashchange', scrollToCommentsIfHash);
    }
  </script>
  <div id="floating-actions" class="fixed bottom-5 right-5 z-[70] flex flex-col items-end gap-2 xl:right-6">
    <button id="btn-scroll-top" type="button" class="pointer-events-none inline-flex h-10 w-10 items-center justify-center rounded-full border border-zinc-700/90 bg-zinc-900/95 text-zinc-200 opacity-0 shadow-xl shadow-black/40 transition hover:border-zinc-500 hover:bg-zinc-800" aria-label="맨 위로">
      <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7"/></svg>
    </button>
    <button id="btn-report-bug" type="button" class="inline-flex h-10 w-10 items-center justify-center rounded-full border border-rose-700/70 bg-rose-950/80 text-rose-200 shadow-xl shadow-black/40 transition hover:border-rose-500 hover:bg-rose-900/80" aria-label="버그 신고">
      <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="1.9" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v4m0 4h.01M8.93 4.93l-5 5m17.14-5l-5 5M6.34 14h11.32a2 2 0 011.73 3l-5.66 9.8a2 2 0 01-3.46 0L4.61 17a2 2 0 011.73-3z"/></svg>
    </button>
  </div>
  <script>
    (function () {
      var topBtn = document.getElementById('btn-scroll-top');
      var bugBtn = document.getElementById('btn-report-bug');
      function updateTopBtn() {
        var show = window.scrollY > 240;
        topBtn.classList.toggle('opacity-0', !show);
        topBtn.classList.toggle('pointer-events-none', !show);
      }
      updateTopBtn();
      window.addEventListener('scroll', updateTopBtn, { passive: true });
      topBtn.addEventListener('click', function () {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
      bugBtn.addEventListener('click', function () {
        var u = 'compose.html?bug=1&url=' + encodeURIComponent(location.href);
        window.location.href = u;
      });
    })();
  </script>
