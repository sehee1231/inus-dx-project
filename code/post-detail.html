    function formatCompact(n) {
      if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
      return String(n);
    }

    function parseCompact(s) {
      s = String(s).trim();
      if (s.endsWith('k')) return Math.round(parseFloat(s) * 1000);
      var n = parseInt(s.replace(/,/g, ''), 10);
      return isNaN(n) ? 0 : n;
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function safeJsonParse(s, fallback) {
      try { return JSON.parse(s); } catch (e) { return fallback; }
    }

    function timeAgoShort(iso) {
      try {
        var t = new Date(iso).getTime();
        var now = Date.now();
        var sec = Math.max(0, Math.floor((now - t) / 1000));
        if (sec < 60) return '방금';
        var min = Math.floor(sec / 60);
        if (min < 60) return min + '분 전';
        var hr = Math.floor(min / 60);
        if (hr < 24) return hr + '시간 전';
        var d = Math.floor(hr / 24);
        return d + '일 전';
      } catch (e) {
        return '방금';
      }
    }

    function wireReactions(scope) {
      scope.querySelectorAll('[data-reaction]').forEach(function (btn) {
        var base = parseInt(btn.getAttribute('data-base'), 10);
        var countEl = btn.querySelector('.js-react-count');
        var outline = btn.querySelector('.ic-outline');
        var solid = btn.querySelector('.ic-solid');
        var active = false;
        btn.addEventListener('click', function (e) {
          e.preventDefault();
          e.stopPropagation();
          active = !active;
          btn.setAttribute('aria-pressed', active);
          if (outline) outline.classList.toggle('hidden', active);
          if (solid) solid.classList.toggle('hidden', !active);
          var kind = btn.getAttribute('data-reaction');
          if (kind === 'like') {
            btn.classList.toggle('text-rose-500', active);
            btn.classList.toggle('text-zinc-500', !active);
          }
          if (kind === 'save') {
            btn.classList.toggle('text-amber-600', active);
            btn.classList.toggle('text-zinc-500', !active);
          }
          if (countEl) countEl.textContent = formatCompact(base + (active ? 1 : 0));
        });
      });
    }

    function wireCopyButtons(root) {
      root.querySelectorAll('[data-copy]').forEach(function (btn) {
        btn.addEventListener('click', function (e) {
          e.preventDefault();
          e.stopPropagation();
          var text = btn.getAttribute('data-copy') || '';
          if (!text) return;
          var copyIcon = document.getElementById('icon-copy').innerHTML;
          var checkIcon = document.getElementById('icon-check').innerHTML;
          function flash() {
            btn.innerHTML = checkIcon;
            btn.disabled = true;
            setTimeout(function () {
              btn.innerHTML = copyIcon;
              btn.disabled = false;
            }, 1400);
          }
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(flash).catch(function () {
              window.prompt('프롬프트 복사:', text);
            });
          } else {
            window.prompt('프롬프트 복사:', text);
          }
        });
      });
    }

    function wireShareButtons(root) {
      root.querySelectorAll('[data-share-path]').forEach(function (btn) {
        btn.addEventListener('click', function (e) {
          e.preventDefault();
          e.stopPropagation();
          var url = new URL(btn.getAttribute('data-share-path') || 'project.html', window.location.href).href;
          var title = btn.getAttribute('data-share-title') || document.title;
          var checkIcon = document.getElementById('icon-check').innerHTML;
          function flash() {
            btn.innerHTML = checkIcon;
            btn.disabled = true;
            setTimeout(function () {
              btn.innerHTML = SHARE_ICON;
              btn.disabled = false;
            }, 1400);
          }
          if (navigator.share) {
            navigator.share({ title: title, url: url }).catch(function () {});
            return;
          }
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(url).then(flash).catch(function () {
              window.prompt('공유 링크:', url);
            });
          } else {
            window.prompt('공유 링크:', url);
          }
        });
      });
    }

        thread: [{ who: '김에듀', when: '4시간 전', text: '지표는 학기 단위로 잡을까요?' }],
      },
      'design-tokens-edu': {
        badge: '디자인', badgeClass: 'bg-pink-50 text-pink-900', avatarClass: 'bg-pink-100 text-pink-900', initial: '나', authorName: '나연', timeRelative: '1일 전',
        title: '교육 앱 디자인 토큰 · 컬러·타이포 스케일', excerpt: '접근성 대비와 학년별 밀도 옵션을 같이 정리했습니다.',
        likes: '289', comments: '19', saves: '210', body: '<p>시맨틱 토큰: <code class="rounded bg-zinc-100 px-1">color.text.primary</code> 등으로 교체해 두었습니다.</p>', extra: '#디자인시스템 #토큰', previewHtml: '<div class="mt-4 flex flex-wrap gap-2"><span class="h-10 w-16 rounded-lg bg-pink-500 ring-1 ring-black/10"></span><span class="h-10 w-16 rounded-lg bg-violet-500 ring-1 ring-black/10"></span><span class="h-10 w-16 rounded-lg bg-teal-500 ring-1 ring-black/10"></span></div>', promptText: null,
        thread: [],
      },
      'dev-api-integration': {
        badge: '개발', badgeClass: 'bg-teal-50 text-teal-900', avatarClass: 'bg-teal-100 text-teal-900', initial: '도', authorName: '도윤', timeRelative: '어제',
        title: '학급 API 연동 체크리스트 · 인증·오류 처리', excerpt: 'OAuth 스코프·토큰 갱신·429 백오프를 순서대로 점검합니다.',
        likes: '341', comments: '24', saves: '502', body: '<pre class="overflow-x-auto rounded-lg bg-zinc-900 p-3 text-[0.72rem] text-emerald-300">GET /classes/{id}/roster\nAuthorization: Bearer …</pre><p class="mt-3 text-sm">429 시 지수 백오프 후 재시도, 클라이언트에 재시도 상한을 둡니다.</p>', extra: '#API #연동', previewHtml: '', promptText: null,
        thread: [{ who: '한소희', when: '어제', text: '스테이징 엔드포인트도 표에 넣어 주세요.' }],
      },
    };

    var LS_POSTS = 'eduai_posts_v1';
    var LS_COMMENTS = 'eduai_comments_v1';

    function loadUserPosts() {
      var arr = safeJsonParse(localStorage.getItem(LS_POSTS), []);
      return Array.isArray(arr) ? arr : [];
    }
    function findUserPost(slug) {
      var posts = loadUserPosts();
      for (var i = 0; i < posts.length; i++) {
        if (posts[i] && posts[i].slug === slug) return posts[i];
      }
      return null;
    }

    function badgeForCat(cat) {
      var m = {
        curriculum: { badge: '커리큘럼', badgeClass: 'bg-emerald-50 text-emerald-800', avatarClass: 'bg-emerald-100 text-emerald-900' },
        video: { badge: '영상', badgeClass: 'bg-violet-50 text-violet-800', avatarClass: 'bg-violet-100 text-violet-900' },
        prompt: { badge: '프롬프트', badgeClass: 'bg-fuchsia-50 text-fuchsia-900', avatarClass: 'bg-fuchsia-100 text-fuchsia-900' },
        output: { badge: '결과물', badgeClass: 'bg-orange-50 text-orange-900', avatarClass: 'bg-orange-100 text-orange-900' },
        insight: { badge: '인사이트', badgeClass: 'bg-amber-50 text-amber-900', avatarClass: 'bg-amber-100 text-amber-950' },
        community: { badge: '커뮤니티', badgeClass: 'bg-rose-50 text-rose-900', avatarClass: 'bg-rose-100 text-rose-900' },
        planning: { badge: '기획', badgeClass: 'bg-indigo-50 text-indigo-900', avatarClass: 'bg-indigo-100 text-indigo-900' },
        design: { badge: '디자인', badgeClass: 'bg-pink-50 text-pink-900', avatarClass: 'bg-pink-100 text-pink-900' },
        development: { badge: '개발', badgeClass: 'bg-teal-50 text-teal-900', avatarClass: 'bg-teal-100 text-teal-900' },
      };
      return m[cat] || m.community;
    }

    function userPostToDetail(u) {
      var b = badgeForCat(u.cat);
      return {
        badge: b.badge,
        badgeClass: b.badgeClass,
        avatarClass: b.avatarClass,
        initial: String((u.authorName || '나').charAt(0)),
        authorName: u.authorName || '김에듀',
        timeRelative: timeAgoShort(u.createdAt),
        title: u.title || '제목 없음',
        excerpt: u.excerpt || '',
        likes: '0',
        comments: '0',
        saves: '0',
        body: '<p>' + escapeHtml(u.body || '').replace(/\\n/g, '<br/>') + '</p>',
        extra: '',
        previewHtml: '',
        promptText: null,
        thread: [],
      };
    }

    function loadUserComments(slug) {
      var all = safeJsonParse(localStorage.getItem(LS_COMMENTS), {});
      if (!all || typeof all !== 'object') all = {};
      var arr = all[slug];
      return Array.isArray(arr) ? arr : [];
    }
    function addUserComment(slug, who, text) {
      var all = safeJsonParse(localStorage.getItem(LS_COMMENTS), {});
      if (!all || typeof all !== 'object') all = {};
      var arr = all[slug];
      if (!Array.isArray(arr)) arr = [];
      arr.push({ id: 'c-' + Date.now() + '-' + Math.floor(Math.random() * 1000000), who: who, when: new Date().toISOString(), text: text });
      all[slug] = arr;
      localStorage.setItem(LS_COMMENTS, JSON.stringify(all));
    }

    function deleteUserComment(slug, id) {
      var all = safeJsonParse(localStorage.getItem(LS_COMMENTS), {});
      if (!all || typeof all !== 'object') all = {};
      var arr = all[slug];
      if (!Array.isArray(arr)) return;
      all[slug] = arr.filter(function (c) { return c && c.id !== id; });
      localStorage.setItem(LS_COMMENTS, JSON.stringify(all));
    }

    function renderComments(thread) {
      if (!thread || !thread.length) return '<p class="py-6 text-center text-sm text-zinc-400">댓글이 없습니다.</p>';
      return thread.map(function (c) {
        var pad = c.reply ? ' pl-10 border-l border-zinc-100 ml-2' : '';
        var when = c.when && String(c.when).includes('T') ? timeAgoShort(c.when) : c.when;
        var canDel = c.isUser && c.id;
        return (
          '<div class="py-3' + pad + '">' +
          '<div class="flex gap-3">' +
          '<div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-zinc-100 text-2xs font-bold text-zinc-600">' + escapeHtml((c.who || '?').charAt(0)) + '</div>' +
          '<div class="min-w-0 flex-1">' +
          '<div class="flex items-center justify-between gap-2">' +
          '<div class="min-w-0">' +
          '<span class="text-sm font-semibold text-zinc-900">' + escapeHtml(c.who) + '</span>' +
          '<span class="ml-2 text-2xs text-zinc-400">' + escapeHtml(when) + '</span>' +
          '</div>' +
          (canDel ? '<button type="button" class="js-del-comment shrink-0 rounded-full px-2 py-1 text-2xs font-semibold text-zinc-400 hover:bg-zinc-100 hover:text-zinc-700" data-comment-id="' + escapeHtml(c.id) + '">삭제</button>' : '') +
          '</div>' +
          '<p class="mt-1 text-sm leading-relaxed text-zinc-700">' + escapeHtml(c.text) + '</p>' +
          '</div></div></div>'
        );
      }).join('');
    }

    function renderArticle(p, slug) {
      var likeBase = parseCompact(p.likes);
      var saveBase = parseCompact(p.saves);
      var cmt = parseCompact(p.comments);
      var bodyHtml = (p.previewHtml || '') + (p.body || '');
      if (p.promptText) {
        var pt = escapeHtml(p.promptText);
        bodyHtml += '<div class="relative mt-4 rounded-lg border border-zinc-200 bg-zinc-50 p-3 pr-12 font-mono text-2xs leading-relaxed text-zinc-800 sm:text-xs"><button type="button" class="js-prompt-copy absolute right-2 top-1/2 inline-flex h-8 w-8 -translate-y-1/2 items-center justify-center rounded-lg bg-white text-zinc-600 shadow-sm ring-1 ring-zinc-200/80 hover:bg-zinc-50" aria-label="프롬프트 복사">' + document.getElementById('icon-copy').innerHTML + '</button><span class="whitespace-pre-wrap">' + pt + '</span></div>';
      }
      if (!String(bodyHtml).trim()) bodyHtml = '<p class="text-sm text-zinc-500">본문이 없습니다.</p>';
      return '<div class="flex gap-3 p-4 sm:p-5"><span class="flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl text-base font-bold ' + p.avatarClass + '">' + escapeHtml(p.initial) + '</span><div class="min-w-0 flex-1"><div class="flex flex-wrap items-center gap-x-2 gap-y-1"><span class="font-semibold text-zinc-900">' + escapeHtml(p.authorName) + '</span><span class="rounded px-1.5 py-0.5 text-2xs font-semibold ' + p.badgeClass + '">' + escapeHtml(p.badge) + '</span><span class="text-2xs text-zinc-400">' + escapeHtml(p.timeRelative) + '</span></div><h1 class="mt-2 text-lg font-bold leading-snug text-zinc-900 sm:text-xl">' + escapeHtml(p.title) + '</h1><p class="mt-2 text-sm text-zinc-600">' + escapeHtml(p.excerpt) + '</p></div></div><div class="border-t border-zinc-100 px-4 py-4 sm:px-5"><div class="prose prose-zinc max-w-none text-sm leading-relaxed text-zinc-800">' + bodyHtml + '</div>' + (p.extra ? '<p class="mt-4 text-2xs text-zinc-400">' + escapeHtml(p.extra) + '</p>' : '') + '</div><div class="flex flex-wrap items-center gap-1 border-t border-zinc-100 bg-zinc-50/50 px-2 py-2 sm:px-3"><button type="button" data-reaction="like" data-base="' + likeBase + '" aria-pressed="false" class="inline-flex items-center gap-1.5 rounded-lg px-2 py-1.5 text-2xs font-medium text-zinc-500 hover:bg-white">' + HEART_OUT + HEART_IN + '<span class="js-react-count tabular-nums">' + formatCompact(likeBase) + '</span></button><a href="#comments" class="inline-flex items-center gap-1.5 rounded-lg px-2 py-1.5 text-2xs font-medium text-zinc-500 hover:bg-white"><svg class="h-4 w-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24"><path stroke-linecap="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg><span class="tabular-nums">' + cmt + '</span></a><button type="button" data-reaction="save" data-base="' + saveBase + '" aria-pressed="false" class="inline-flex items-center gap-1.5 rounded-lg px-2 py-1.5 text-2xs font-medium text-zinc-500 hover:bg-white">' + MARK_OUT + MARK_IN + '<span class="js-react-count tabular-nums">' + formatCompact(saveBase) + '</span></button><button type="button" data-share-path="post-detail.html?slug=' + encodeURIComponent(slug) + '" data-share-title="' + escapeHtml(p.title) + '" class="inline-flex items-center gap-1.5 rounded-lg px-2 py-1.5 text-2xs font-medium text-zinc-500 hover:bg-white" aria-label="공유">' + SHARE_ICON + '</button></div>';
    }

    var params = new URLSearchParams(window.location.search);
    var slug = params.get('slug') || '';
    var post = DATA[slug];
    var userPost = null;
    if (!post) {
      var up = findUserPost(slug);
      if (up) {
        userPost = up;
        post = userPostToDetail(up);
      }
    } else {
      var up2 = findUserPost(slug);
      if (up2) userPost = up2;
    }
    if (!post) {
      document.getElementById('not-found').classList.remove('hidden');
    } else {
      document.getElementById('post-root').classList.remove('hidden');
      document.getElementById('article-main').innerHTML = renderArticle(post, slug);
      document.title = '에듀AI — ' + post.title;
      var copyBtn = document.querySelector('.js-prompt-copy');
      if (copyBtn && post.promptText) copyBtn.setAttribute('data-copy', post.promptText);
      function renderAllComments() {
        var userThread = loadUserComments(slug).map(function (c, idx) {
          var id = c.id || ('legacy-' + idx + '-' + (c.when || ''));
          return { id: id, who: c.who, when: c.when, text: c.text, isUser: (c.who === '김에듀') };
        });
        var seed = post.thread || [];
        var merged = seed.concat(userThread);
        document.getElementById('comment-thread').innerHTML = renderComments(merged);
        document.getElementById('comment-count').textContent = '(' + merged.length + ')';
      }
      renderAllComments();
      wireReactions(document.getElementById('article-main'));
      wireCopyButtons(document.getElementById('article-main'));
      wireShareButtons(document.getElementById('article-main'));

      var inEl = document.getElementById('comment-input');
      var btnEl = document.getElementById('comment-submit');
      function submitComment() {
        var text = (inEl.value || '').trim();
        if (!text) return;
        addUserComment(slug, '김에듀', text);
        inEl.value = '';
        renderAllComments();
      }
      btnEl.addEventListener('click', submitComment);
      inEl.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') submitComment();
      });

      document.getElementById('comment-thread').addEventListener('click', function (e) {
        var t = e.target;
        if (!t || !t.classList || !t.classList.contains('js-del-comment')) return;
        var id = t.getAttribute('data-comment-id') || '';
        if (!id) return;
        if (!confirm('이 댓글을 삭제할까요?')) return;
        deleteUserComment(slug, id);
        renderAllComments();
      });

      // 내 글 편집/삭제
      if (userPost) {
        var bEdit = document.getElementById('btn-edit');
        var bDel = document.getElementById('btn-delete');
        bEdit.classList.remove('hidden');
        bDel.classList.remove('hidden');
        bEdit.addEventListener('click', function () {
          location.href = 'compose.html?edit=' + encodeURIComponent(userPost.slug);
        });
        bDel.addEventListener('click', function () {
          if (!confirm('이 글을 삭제할까요? (댓글도 함께 삭제됩니다)')) return;
          var posts = loadUserPosts();
          var next = posts.filter(function (p) { return p && p.slug !== userPost.slug; });
          localStorage.setItem(LS_POSTS, JSON.stringify(next));
          // delete comments for this slug
          var all = safeJsonParse(localStorage.getItem(LS_COMMENTS), {});
          if (all && typeof all === 'object') {
            delete all[userPost.slug];
            localStorage.setItem(LS_COMMENTS, JSON.stringify(all));
          }
          location.href = 'project.html';
        });
      }

      function scrollToCommentsIfHash() {
        if (location.hash !== '#comments') return;
        var el = document.getElementById('comments');
        if (!el) return;
        function go() {
          el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        requestAnimationFrame(function () {
          requestAnimationFrame(go);
        });
      }
      scrollToCommentsIfHash();
      window.addEventListener('hashchange', scrollToCommentsIfHash);
    }
  </script>
</body>
