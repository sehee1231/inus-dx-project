  <script>
    (function () {
      document.getElementById('btn-back').addEventListener('click', function () {

        else window.location.href = 'project.html';
      });
    })();

    function formatCompact(n) {
      if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
      return String(n);
    }

    function parseCompact(s) {
      s = String(s).trim();
      if (s.endsWith('k')) return Math.round(parseFloat(s) * 1000);
      var n = parseInt(s.replace(/,/g, ''), 10);
      return isNaN(n) ? 0 : n;
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function escAttr(s) {
      return String(s || '')
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function safeJsonParse(s, fallback) {
      try { return JSON.parse(s); } catch (e) { return fallback; }
    }

    var LS_MENTION_INBOX = 'eduai_mention_inbox_v1';
    function parseMentionNames(text) {
      var re = /@([\uac00-\ud7a3a-zA-Z0-9_·]{1,24})/g;
      var m;
      var out = [];
      var seen = {};
      while ((m = re.exec(String(text || ''))) !== null) {
        var name = String(m[1] || '').trim();
        if (!name || seen[name]) continue;
        seen[name] = 1;
        out.push(name);
      }
      return out;
    }
    function pushMentionNotifications(fromUser, names, ctx) {
      if (!names || !names.length) return;
      var arr = safeJsonParse(localStorage.getItem(LS_MENTION_INBOX), []);
      if (!Array.isArray(arr)) arr = [];
      var slug = ctx.postSlug || '';
      var title = ctx.postTitle || '';
      var snippet = String(ctx.snippet || '').slice(0, 160);
      var source = ctx.source || 'comment';
      names.forEach(function (to) {
        if (!to || to === fromUser) return;
        arr.unshift({
          id: 'n-' + Date.now() + '-' + Math.floor(Math.random() * 1e9),
          at: new Date().toISOString(),
          read: false,
          toUser: to,
          fromUser: fromUser,
          postSlug: slug,
          postTitle: title,
          snippet: snippet,
          source: source,
        });
      });
      localStorage.setItem(LS_MENTION_INBOX, JSON.stringify(arr.slice(0, 200)));
    }

    function timeAgoShort(iso) {
      try {
        var t = new Date(iso).getTime();
        var now = Date.now();
        var sec = Math.max(0, Math.floor((now - t) / 1000));
        if (sec < 60) return '방금';
        var min = Math.floor(sec / 60);
        if (min < 60) return min + '분 전';
        var hr = Math.floor(min / 60);
        if (hr < 24) return hr + '시간 전';
        var d = Math.floor(hr / 24);
        return d + '일 전';
      } catch (e) {
        return '방금';
      }
    }

    var HEART_OUT = '<svg class="ic-outline h-4 w-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24"><path stroke-linecap="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>';
    var HEART_IN = '<svg class="ic-solid hidden h-4 w-4 shrink-0 text-rose-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>';
    var MARK_OUT = '<svg class="ic-outline h-4 w-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24"><path stroke-linecap="round" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/></svg>';
    var MARK_IN = '<svg class="ic-solid hidden h-4 w-4 shrink-0 text-amber-600" fill="currentColor" viewBox="0 0 24 24"><path d="M5 3a2 2 0 012-2h10a2 2 0 012 2v18l-7-4-7 4V3z"/></svg>';
    var SHARE_ICON = '<svg class="h-4 w-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.59 13.51L15.42 17.5M15.41 6.5L8.59 10.49M18 21a3 3 0 100-6 3 3 0 000 6zM6 14a3 3 0 100-6 3 3 0 000 6zM18 9a3 3 0 100-6 3 3 0 000 6z"/></svg>';

    function wireReactions(scope) {
      scope.querySelectorAll('[data-reaction]').forEach(function (btn) {
        var base = parseInt(btn.getAttribute('data-base'), 10);
        var countEl = btn.querySelector('.js-react-count');
        var outline = btn.querySelector('.ic-outline');
        var solid = btn.querySelector('.ic-solid');
        var active = false;
        btn.addEventListener('click', function (e) {
          e.preventDefault();
          e.stopPropagation();
          active = !active;
          btn.setAttribute('aria-pressed', active);
          if (outline) outline.classList.toggle('hidden', active);
          if (solid) solid.classList.toggle('hidden', !active);
          var kind = btn.getAttribute('data-reaction');

          '</div>' +
          (canManage
            ? '<div class="flex items-center gap-1"><button type="button" class="js-edit-comment shrink-0 rounded-full px-2 py-1 text-2xs font-semibold text-zinc-500 hover:bg-zinc-800 hover:text-zinc-200" data-comment-id="' + escapeHtml(c.id) + '" data-comment-text="' + escapeHtml(c.text) + '">수정</button><button type="button" class="js-del-comment shrink-0 rounded-full px-2 py-1 text-2xs font-semibold text-zinc-500 hover:bg-zinc-800 hover:text-zinc-200" data-comment-id="' + escapeHtml(c.id) + '">삭제</button></div>'
            : '') +
          '</div>' +
          '<p class="mt-1 text-sm leading-relaxed text-zinc-300">' +
          formatCommentDisplay(c.text) +
          '</p>' +
          '</div></div></div>'
        );
      }).join('');
    }

    function renderArticle(p, slug) {
      var likeBase = parseCompact(p.likes);
      var saveBase = parseCompact(p.saves);
      var cmt = parseCompact(p.comments);
      var bodyHtml = (p.previewHtml || '') + (p.body || '');
      if (p.promptText) {
        var pt = escapeHtml(p.promptText);
        bodyHtml += '<div class="relative mt-4 rounded-lg border border-zinc-700 bg-zinc-950 p-3 pr-12 font-mono text-2xs leading-relaxed text-zinc-300 sm:text-xs"><button type="button" class="js-prompt-copy absolute right-2 top-1/2 z-10 inline-flex h-8 w-8 -translate-y-1/2 items-center justify-center rounded-lg bg-zinc-800 text-zinc-200 shadow-md ring-1 ring-zinc-600/80 hover:bg-zinc-700" aria-label="프롬프트 복사">' + document.getElementById('icon-copy').innerHTML + '</button><span class="whitespace-pre-wrap">' + pt + '</span></div>';
      }
      if (!String(bodyHtml).trim()) bodyHtml = '<p class="text-sm text-zinc-500">본문이 없습니다.</p>';
      return '<div class="flex gap-3 p-4 sm:p-5"><span class="flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl text-base font-bold ' + p.avatarClass + '">' + escapeHtml(p.initial) + '</span><div class="min-w-0 flex-1"><div class="flex flex-wrap items-center gap-x-2 gap-y-1"><span class="font-semibold text-zinc-100">' + escapeHtml(p.authorName) + '</span><span class="rounded px-1.5 py-0.5 text-2xs font-semibold ' + p.badgeClass + '">' + escapeHtml(p.badge) + '</span><span class="text-2xs text-zinc-500">' + escapeHtml(p.timeRelative) + '</span></div><h1 class="mt-2 text-lg font-bold leading-snug text-zinc-100 sm:text-xl">' + escapeHtml(p.title) + '</h1><p class="mt-2 text-sm text-zinc-400">' + escapeHtml(p.excerpt) + '</p>' + (p.link ? '<p class="mt-2"><a href="' + escAttr(p.link) + '" class="break-all text-sm text-sky-400 underline underline-offset-2 hover:text-sky-300" target="_blank" rel="noopener noreferrer">' + escapeHtml(p.link) + '</a></p>' : '') + '</div></div><div class="border-t border-zinc-800/80 px-4 py-4 sm:px-5"><div class="prose prose-invert prose-zinc relative z-0 max-w-none text-sm leading-relaxed text-zinc-300">' + bodyHtml + '</div>' + (p.extra ? '<p class="mt-4 text-2xs text-zinc-500">' + escapeHtml(p.extra) + '</p>' : '') + '</div><div class="relative z-10 flex flex-wrap items-center gap-1 border-t border-zinc-800/80 bg-zinc-950/60 px-2 py-2 sm:px-3"><button type="button" data-reaction="like" data-base="' + likeBase + '" aria-pressed="false" class="inline-flex items-center gap-1.5 rounded-lg px-2 py-1.5 text-2xs font-medium text-zinc-400 hover:bg-zinc-800/90 hover:text-zinc-100">' + HEART_OUT + HEART_IN + '<span class="js-react-count tabular-nums">' + formatCompact(likeBase) + '</span></button><a href="#comments" class="inline-flex items-center gap-1.5 rounded-lg px-2 py-1.5 text-2xs font-medium text-zinc-400 hover:bg-zinc-800/90 hover:text-zinc-100"><svg class="h-4 w-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24"><path stroke-linecap="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg><span class="tabular-nums">' + cmt + '</span></a><button type="button" data-reaction="save" data-base="' + saveBase + '" aria-pressed="false" class="inline-flex items-center gap-1.5 rounded-lg px-2 py-1.5 text-2xs font-medium text-zinc-400 hover:bg-zinc-800/90 hover:text-zinc-100">' + MARK_OUT + MARK_IN + '<span class="js-react-count tabular-nums">' + formatCompact(saveBase) + '</span></button><button type="button" data-share-path="post-detail.html?slug=' + encodeURIComponent(slug) + '" data-share-title="' + escapeHtml(p.title) + '" class="inline-flex items-center gap-1.5 rounded-lg px-2 py-1.5 text-2xs font-medium text-zinc-400 hover:bg-zinc-800/90 hover:text-zinc-100" aria-label="공유">' + SHARE_ICON + '</button></div>';
    }

    var params = new URLSearchParams(window.location.search);
    var slug = params.get('slug') || '';
    var post = DATA[slug];
    var userPost = null;
    if (!post) {
      var up = findUserPost(slug);
      if (up) {
        userPost = up;
        post = userPostToDetail(up);
      }
    } else {
      var up2 = findUserPost(slug);
      if (up2) userPost = up2;
    }
    if (!post) {
      document.getElementById('not-found').classList.remove('hidden');
    } else {
      document.getElementById('post-root').classList.remove('hidden');
      document.getElementById('article-main').innerHTML = renderArticle(post, slug);
      document.title = '클래스루프 — ' + post.title;
      var copyBtn = document.querySelector('.js-prompt-copy');
      if (copyBtn && post.promptText) copyBtn.setAttribute('data-copy', post.promptText);
      function renderAllComments() {
        var userThread = loadUserComments(slug).map(function (c, idx) {
          var id = c.id || ('legacy-' + idx + '-' + (c.when || ''));
          return { id: id, who: c.who, when: c.when, text: c.text, isUser: (c.who === '김에듀') };
        });
        var seed = post.thread || [];
        var merged = seed.concat(userThread);
        document.getElementById('comment-thread').innerHTML = renderComments(merged);
        document.getElementById('comment-count').textContent = '(' + merged.length + ')';
      }
      renderAllComments();
      wireReactions(document.getElementById('article-main'));
      wireCopyButtons(document.getElementById('article-main'));
      wireShareButtons(document.getElementById('article-main'));

      var inEl = document.getElementById('comment-input');
      var btnEl = document.getElementById('comment-submit');
      var cancelEl = document.getElementById('comment-cancel');
      var editingCommentId = null;
      function setEditMode(id, text) {
        editingCommentId = id;
        inEl.value = text || '';
        btnEl.textContent = '수정 저장';
        cancelEl.classList.remove('hidden');
        inEl.focus();
      }
      function clearEditMode() {
        editingCommentId = null;
        btnEl.textContent = '등록';
        cancelEl.classList.add('hidden');
      }
      function submitComment() {
        var text = (inEl.value || '').trim();
        if (!text) return;
        if (editingCommentId) {
          var ok = updateUserComment(slug, editingCommentId, text);
          if (!ok) {
            alert('수정할 댓글을 찾지 못했습니다.');
          }
        } else {
          addUserComment(slug, '김에듀', text);
          var mn = parseMentionNames(text);
          if (mn.length) {
            pushMentionNotifications('김에듀', mn, {
              postSlug: slug,
              postTitle: post.title || '',
              snippet: text,
              source: 'comment',
            });
          }
        }
        inEl.value = '';
        clearEditMode();
        renderAllComments();
      }
      btnEl.addEventListener('click', submitComment);
      cancelEl.addEventListener('click', function () {
        inEl.value = '';
        clearEditMode();
      });
      inEl.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') submitComment();
      });

      document.getElementById('comment-thread').addEventListener('click', function (e) {
        var t = e.target;
        if (!t || !t.classList) return;
        if (t.classList.contains('js-edit-comment')) {
          var eid = t.getAttribute('data-comment-id') || '';
          var etext = t.getAttribute('data-comment-text') || '';
          if (!eid) return;
          setEditMode(eid, etext);
          return;
        }
        if (!t.classList.contains('js-del-comment')) return;
        var id = t.getAttribute('data-comment-id') || '';
        if (!id) return;
        if (!confirm('이 댓글을 삭제할까요?')) return;
        deleteUserComment(slug, id);
        if (editingCommentId === id) {
          inEl.value = '';
          clearEditMode();
        }
        renderAllComments();
      });

      // 내 글 편집/삭제
      if (userPost) {
        var bEdit = document.getElementById('btn-edit');
        var bDel = document.getElementById('btn-delete');
        bEdit.classList.remove('hidden');
        bDel.classList.remove('hidden');
        bEdit.addEventListener('click', function () {
          location.href = 'compose.html?edit=' + encodeURIComponent(userPost.slug);
        });
        bDel.addEventListener('click', function () {
          if (!confirm('이 글을 삭제할까요? (댓글도 함께 삭제됩니다)')) return;
          var posts = loadUserPosts();
          var next = posts.filter(function (p) { return p && p.slug !== userPost.slug; });
          localStorage.setItem(LS_POSTS, JSON.stringify(next));
          // delete comments for this slug
          var all = safeJsonParse(localStorage.getItem(LS_COMMENTS), {});
          if (all && typeof all === 'object') {
            delete all[userPost.slug];
            localStorage.setItem(LS_COMMENTS, JSON.stringify(all));
          }
          location.href = 'project.html';
        });
      }

      function scrollToCommentsIfHash() {
        if (location.hash !== '#comments') return;
        var el = document.getElementById('comments');
        if (!el) return;
        function go() {
          el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        requestAnimationFrame(function () {
          requestAnimationFrame(go);
        });
      }
      scrollToCommentsIfHash();
      window.addEventListener('hashchange', scrollToCommentsIfHash);
    }
  </script>
  <div id="floating-actions" class="fixed bottom-5 right-5 z-[70] flex flex-col items-end gap-2 xl:right-6">
    <button id="btn-scroll-top" type="button" class="pointer-events-none inline-flex h-10 w-10 items-center justify-center rounded-full border border-zinc-700/90 bg-zinc-900/95 text-zinc-200 opacity-0 shadow-xl shadow-black/40 transition hover:border-zinc-500 hover:bg-zinc-800" aria-label="맨 위로">
      <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7"/></svg>
    </button>
    <button id="btn-report-bug" type="button" class="inline-flex h-10 w-10 items-center justify-center rounded-full border border-rose-700/70 bg-rose-950/80 text-rose-200 shadow-xl shadow-black/40 transition hover:border-rose-500 hover:bg-rose-900/80" aria-label="버그 신고">
      <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="1.9" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v4m0 4h.01M8.93 4.93l-5 5m17.14-5l-5 5M6.34 14h11.32a2 2 0 011.73 3l-5.66 9.8a2 2 0 01-3.46 0L4.61 17a2 2 0 011.73-3z"/></svg>
    </button>
  </div>
  <script>
    (function () {
      var topBtn = document.getElementById('btn-scroll-top');
      var bugBtn = document.getElementById('btn-report-bug');
      function updateTopBtn() {
        var show = window.scrollY > 240;
        topBtn.classList.toggle('opacity-0', !show);
        topBtn.classList.toggle('pointer-events-none', !show);
      }
      updateTopBtn();
      window.addEventListener('scroll', updateTopBtn, { passive: true });
      topBtn.addEventListener('click', function () {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
      bugBtn.addEventListener('click', function () {
        var u = 'compose.html?bug=1&url=' + encodeURIComponent(location.href);
        window.location.href = u;
      });
    })();
  </script>
</body>
</html>
