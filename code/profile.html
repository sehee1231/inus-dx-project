  <script>
    if (window.MoaAuth && window.MoaAuth.requireAuth) { window.MoaAuth.requireAuth(); }
    document.getElementById('btn-back').addEventListener('click', function () {
      if (history.length > 1) history.back();
      else location.href = 'project.html';
    });

    (async function renderProfilePosts() {
      var CAT_LABEL = {
        planning: '기획',
        design: '디자인',
        development: '개발',
        curriculum: '커리큘럼',
        video: '영상',
        prompt: '프롬프트',
        output: '결과물',
        insight: '인사이트',
        community: '커뮤니티',
      };
      var CAT_BADGE = {
        planning: 'bg-indigo-900/55 text-indigo-100 ring-1 ring-indigo-500/20',
        design: 'bg-pink-900/50 text-pink-100 ring-1 ring-pink-500/20',
        development: 'bg-teal-900/50 text-teal-100 ring-1 ring-teal-500/20',
        curriculum: 'bg-emerald-900/50 text-emerald-100 ring-1 ring-emerald-500/20',
        video: 'bg-violet-900/50 text-violet-100 ring-1 ring-violet-500/20',
        prompt: 'bg-fuchsia-900/50 text-fuchsia-100 ring-1 ring-fuchsia-500/20',
        output: 'bg-orange-900/50 text-orange-100 ring-1 ring-orange-500/20',
        insight: 'bg-amber-900/50 text-amber-100 ring-1 ring-amber-500/20',
        community: 'bg-rose-900/50 text-rose-100 ring-1 ring-rose-500/20',
      };
      function growthStageFromPostCount(count) {
        var n = Math.max(0, Number(count) || 0);
        if (n <= 0) return 1;
        if (n <= 2) return 2;
        if (n <= 5) return 3;
        if (n <= 9) return 4;
        return 5;
      }
      function updateModakGrowthVisual(postCount) {
        var wrap = document.getElementById('modak-fire-wrap');
        var glow = document.getElementById('modak-fire-glow');
        var img = document.getElementById('modak-fire-brand');
        if (!wrap || !img) return;
        var stage = growthStageFromPostCount(postCount);
        img.src = 'assets/' + stage + '.png';
        img.alt = '모닥 성장 단계 ' + stage;
        wrap.style.transform = 'scale(1)';
        if (glow) {
          glow.style.opacity = String(Math.min(0.28 + stage * 0.11, 0.82));
        }
      }
      function esc(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/"/g, '&quot;');
      }
      async function loadPosts() {
        if (window.MoaPostsDB && window.MoaPostsDB.migrateLocalPostsOnce) {
          try { await window.MoaPostsDB.migrateLocalPostsOnce(); } catch (e) {}
        }
        if (window.MoaPostsDB && window.MoaPostsDB.fetchPosts) {
          return await window.MoaPostsDB.fetchPosts();
        }
        try {
          var raw = localStorage.getItem('eduai_posts_v1');
          var arr = JSON.parse(raw || '[]');
          return Array.isArray(arr) ? arr : [];
        } catch (e) {
          return [];
        }
      }
      function fmtWhen(iso) {
        if (!iso) return '';
        var d = new Date(iso);
        if (isNaN(d.getTime())) return '';
        return d.toLocaleString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      }
      var ul = document.getElementById('profile-posts');
      var emptyEl = document.getElementById('profile-posts-empty');
      var statEl = document.getElementById('profile-stat-posts');
      if (!ul) return;
      var posts = (await loadPosts()).filter(function (p) {
        return p && p.slug;
      });
      posts.sort(function (a, b) {
        return String(b.createdAt || '').localeCompare(String(a.createdAt || ''));
      });
      if (statEl) statEl.textContent = String(posts.length);
      updateModakGrowthVisual(posts.length);
      ul.innerHTML = '';
      if (!posts.length) {
        if (emptyEl) emptyEl.classList.remove('hidden');
        return;
      }
      if (emptyEl) emptyEl.classList.add('hidden');
      var icon =
        '<svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>';
      posts.forEach(function (p) {
        var cat = p.cat || 'community';
        var lab = CAT_LABEL[cat] || cat;
        var badgeCls = CAT_BADGE[cat] || 'bg-zinc-800 text-zinc-300';
        var href = 'post-detail.html?slug=' + encodeURIComponent(p.slug);
        var when = fmtWhen(p.createdAt);
        var li = document.createElement('li');
        li.innerHTML =
          '<a href="' +
          href +
          '" class="flex gap-3 rounded-xl border border-transparent py-4 px-3 transition hover:border-zinc-700/70 hover:bg-zinc-800/35">' +
          '<span class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl bg-zinc-800 text-zinc-300">' +
          icon +
          '</span>' +
          '<div class="min-w-0 flex-1">' +
          '<p class="line-clamp-2 text-sm font-medium text-zinc-100">' +
          esc(p.title || '제목 없음') +
          '</p>' +
          '<div class="mt-1 flex flex-wrap items-center gap-1.5">' +
          '<span class="rounded-md ' +
          badgeCls +
          ' px-1.5 py-0.5 text-2xs font-medium">' +
          esc(lab) +
          '</span>' +
          (when ? '<span class="text-2xs text-zinc-400">' + esc(when) + '</span>' : '') +
          '</div></div></a>';
        ul.appendChild(li);
      });
    })();
  </script>
    </div>
  <div id="floating-actions" class="fixed bottom-5 right-5 z-[70] flex flex-col items-end gap-2 xl:right-6">
    <button id="btn-scroll-top" type="button" class="pointer-events-none inline-flex h-10 w-10 items-center justify-center rounded-full border border-zinc-700/90 bg-zinc-900/95 text-zinc-200 opacity-0 shadow-xl shadow-black/40 transition hover:border-zinc-500 hover:bg-zinc-800" aria-label="맨 위로">
      <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7"/></svg>
    </button>
    <button id="btn-report-bug" type="button" class="inline-flex h-10 w-10 items-center justify-center rounded-full border border-rose-700/70 bg-rose-950/80 text-rose-200 shadow-xl shadow-black/40 transition hover:border-rose-500 hover:bg-rose-900/80" aria-label="버그 신고">
      <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="1.9" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v4m0 4h.01M8.93 4.93l-5 5m17.14-5l-5 5M6.34 14h11.32a2 2 0 011.73 3l-5.66 9.8a2 2 0 01-3.46 0L4.61 17a2 2 0 011.73-3z"/></svg>
    </button>
  </div>
  <script>
    (function () {
      var topBtn = document.getElementById('btn-scroll-top');
      var bugBtn = document.getElementById('btn-report-bug');
      function updateTopBtn() {
        var show = window.scrollY > 240;
        topBtn.classList.toggle('opacity-0', !show);
        topBtn.classList.toggle('pointer-events-none', !show);
      }
      updateTopBtn();
      window.addEventListener('scroll', updateTopBtn, { passive: true });
      topBtn.addEventListener('click', function () {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
      bugBtn.addEventListener('click', function () {
        var u = 'compose.html?bug=1&url=' + encodeURIComponent(location.href);
        window.location.href = u;
      });
    })();
  </script>
